<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>DigiGames</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eee;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }

  /* ===== Menu view ===== */
  #menuView {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0 20px 40px;
    overflow-y: auto;
    transition: opacity 0.25s, transform 0.25s;
  }
  #menuView.hidden {
    display: none;
  }

  header {
    width: 100%;
    max-width: 600px;
    padding: 48px 0 36px;
    text-align: center;
  }
  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ff6b5b 0%, #ffd66b 50%, #4aa8e8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo a {
    text-decoration: none;
    color: inherit;
    -webkit-text-fill-color: inherit;
    background: inherit;
    -webkit-background-clip: text;
    background-clip: text;
  }
  .subtitle {
    margin-top: 8px;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: #3a3a4a;
    text-transform: uppercase;
  }
  .url-hint {
    margin-top: 6px;
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: #252530;
    font-weight: 500;
  }

  .games {
    width: 100%;
    max-width: 600px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }

  .card {
    position: relative;
    border: 1px solid #1a1a2e;
    border-radius: 16px;
    padding: 28px 24px 24px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.3s, background 0.3s, transform 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: #12121c;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .card.snake::before {
    background: radial-gradient(circle at 50% 30%, rgba(76, 175, 80, 0.08) 0%, transparent 70%);
  }
  .card.pipes::before {
    background: radial-gradient(circle at 50% 30%, rgba(255, 107, 91, 0.08) 0%, transparent 70%);
  }
  .card:hover, .card:active {
    border-color: #2a2a44;
    background: #161626;
    transform: translateY(-2px);
  }
  .card:hover::before, .card:active::before { opacity: 1; }
  .card:active { transform: translateY(0); }

  .icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    line-height: 1;
  }
  .snake .icon { background: rgba(76, 175, 80, 0.12); }
  .pipes .icon { background: rgba(255, 107, 91, 0.12); }

  .info { text-align: center; }
  .name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #ddd;
  }
  .desc {
    margin-top: 4px;
    font-size: 0.72rem;
    color: #555;
    letter-spacing: 0.5px;
  }
  .play-btn {
    margin-top: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 3px;
    padding: 8px 24px;
    border-radius: 20px;
    transition: background 0.25s, color 0.25s;
  }
  .snake .play-btn { color: #4CAF50; background: rgba(76, 175, 80, 0.1); }
  .pipes .play-btn { color: #ff6b5b; background: rgba(255, 107, 91, 0.1); }
  .card:hover .play-btn, .card:active .play-btn { color: #fff; }
  .snake:hover .play-btn, .snake:active .play-btn { background: rgba(76, 175, 80, 0.25); }
  .pipes:hover .play-btn, .pipes:active .play-btn { background: rgba(255, 107, 91, 0.25); }

  footer {
    margin-top: auto;
    padding-top: 48px;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: #222;
  }

  @media (max-width: 540px) {
    header { padding: 36px 0 28px; }
    .games { grid-template-columns: 1fr; gap: 12px; }
    .card {
      flex-direction: row;
      padding: 18px 20px;
      gap: 16px;
    }
    .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .info { text-align: left; flex: 1; }
    .name { font-size: 0.85rem; }
    .play-btn {
      margin-top: 0;
      padding: 8px 18px;
      flex-shrink: 0;
      align-self: center;
    }
  }

  /* ===== Game view ===== */
  #gameView {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    z-index: 100;
    background: #0a0a0f;
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }
  #gameView.active {
    display: flex;
  }

  #gameBar {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 12px;
    background: #0e0e18;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
    gap: 12px;
    z-index: 10;
  }
  #backBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    color: #888;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  #backBtn:hover, #backBtn:active {
    color: #ddd;
    border-color: #333;
  }
  #backBtn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }
  #gameTitle {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #gameBrand {
    margin-left: auto;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #1e1e2e;
    flex-shrink: 0;
  }

  #gameFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: #0a0a0f;
  }

  @media (max-width: 540px) {
    #gameBar { height: 40px; padding: 0 8px; }
    #backBtn { padding: 5px 10px; font-size: 0.65rem; }
    #gameTitle { font-size: 0.6rem; letter-spacing: 2px; }
  }

  /* ===== Loading spinner ===== */
  #gameLoading {
    position: absolute;
    top: 44px; right: 0; bottom: 0; left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    z-index: 5;
    transition: opacity 0.3s;
  }
  #gameLoading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #1a1a2e;
    border-top-color: #ff6b5b;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Auth UI ===== */
  #authArea {
    position: absolute;
    top: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 50;
  }
  #authArea .auth-user {
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 1px;
  }
  #authArea button {
    background: none;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    color: #888;
    font-family: inherit;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #authArea button:hover {
    color: #ddd;
    border-color: #333;
  }

  #authModal {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    z-index: 200;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
  }
  #authModal.active { display: flex; }
  #authModal .modal {
    background: #12121c;
    border: 1px solid #1a1a2e;
    border-radius: 16px;
    padding: 32px 28px;
    width: min(360px, 90vw);
  }
  #authModal h3 {
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: #ddd;
    margin-bottom: 20px;
    text-align: center;
  }
  #authModal input {
    display: block;
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 12px;
    background: #0a0a0f;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    color: #eee;
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
  }
  #authModal input:focus { border-color: #333; }
  #authModal .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  #authModal .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    border: 1px solid #1a1a2e;
    transition: all 0.2s;
  }
  #authModal .btn-primary {
    background: linear-gradient(135deg, #ff6b5b, #ffd66b);
    color: #0a0a0f;
    border: none;
  }
  #authModal .btn-secondary {
    background: none;
    color: #888;
  }
  #authModal .btn-secondary:hover { color: #ddd; border-color: #333; }
  #authModal .auth-error {
    color: #ff4a4a;
    font-size: 0.7rem;
    text-align: center;
    margin-top: 8px;
    min-height: 1em;
  }
  #authModal .auth-switch {
    text-align: center;
    margin-top: 14px;
    font-size: 0.65rem;
    color: #555;
  }
  #authModal .auth-switch a {
    color: #888;
    cursor: pointer;
    text-decoration: underline;
  }
  #authModal .auth-switch a:hover { color: #ddd; }
</style>
</head>
<body>

<div id="authArea">
  <span class="auth-user" id="authUserDisplay"></span>
  <button id="authLoginBtn">LOGIN</button>
  <button id="authLogoutBtn" style="display:none">LOGOUT</button>
</div>

<div id="authModal">
  <div class="modal">
    <h3 id="authModalTitle">LOGIN</h3>
    <div id="registerFields" style="display:none">
      <input id="authName" type="text" placeholder="Display Name" maxlength="50" autocomplete="name">
    </div>
    <input id="authUsername" type="text" placeholder="Username" maxlength="30" autocomplete="username">
    <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
    <div class="auth-error" id="authError"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="authCancelBtn">CANCEL</button>
      <button class="btn-primary" id="authSubmitBtn">LOGIN</button>
    </div>
    <div class="auth-switch" id="authSwitch">
      No account? <a id="authSwitchLink">Register</a>
    </div>
  </div>
</div>

<!-- ===== Menu screen ===== -->
<div id="menuView">
  <header>
    <div class="logo"><a href="#" id="homeLink">DigiGames</a></div>
    <div class="subtitle">Choose a game</div>
    <div class="url-hint">www.digigames.fun</div>
  </header>

  <div class="games">
    <a class="card snake" href="#snake" data-game="snake">
      <div class="icon">🐍</div>
      <div class="info">
        <div class="name">SNAKE</div>
        <div class="desc">Classic snake with a merge twist</div>
      </div>
      <div class="play-btn">PLAY</div>
    </a>

    <a class="card pipes" href="#pipes" data-game="pipes">
      <div class="icon">🔧</div>
      <div class="info">
        <div class="name">PIPES</div>
        <div class="desc">Flappy pipes endless runner</div>
      </div>
      <div class="play-btn">PLAY</div>
    </a>
  </div>

  <footer>DIGIGAMES</footer>
</div>

<!-- ===== Game screen (iframe shell) ===== -->
<div id="gameView">
  <div id="gameBar">
    <button id="backBtn">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      MENU
    </button>
    <span id="gameTitle"></span>
    <span id="gameBrand">DIGIGAMES</span>
  </div>
  <div id="gameLoading"><div class="spinner"></div></div>
  <iframe id="gameFrame" allowfullscreen></iframe>
</div>

<script src="js/auth.js"></script>
<script>
const ROUTES = {
  snake: { src: 'games/snake/index.html', title: 'SNAKE' },
  pipes: { src: 'games/pipes/pipes.html', title: 'PIPES' },
};

const menuView = document.getElementById('menuView');
const gameView = document.getElementById('gameView');
const gameFrame = document.getElementById('gameFrame');
const gameTitle = document.getElementById('gameTitle');
const gameLoading = document.getElementById('gameLoading');

function showMenu() {
  gameFrame.src = 'about:blank';
  gameView.classList.remove('active');
  menuView.classList.remove('hidden');
  document.title = 'DigiGames';
}

function showGame(key) {
  const route = ROUTES[key];
  if (!route) { showMenu(); return; }
  menuView.classList.add('hidden');
  gameView.classList.add('active');
  gameLoading.classList.remove('hidden');
  gameTitle.textContent = route.title;
  document.title = route.title + ' - DigiGames';
  gameFrame.onload = () => gameLoading.classList.add('hidden');
  gameFrame.src = route.src;
}

function navigate() {
  const hash = location.hash.replace('#', '').toLowerCase();
  if (hash && ROUTES[hash]) {
    showGame(hash);
  } else {
    showMenu();
  }
}

window.addEventListener('hashchange', navigate);

document.getElementById('backBtn').addEventListener('click', () => {
  location.hash = '';
});

navigate();

// ===== Auth UI =====
const authArea = document.getElementById('authArea');
const authUserDisplay = document.getElementById('authUserDisplay');
const authLoginBtn = document.getElementById('authLoginBtn');
const authLogoutBtn = document.getElementById('authLogoutBtn');
const authModal = document.getElementById('authModal');
const authModalTitle = document.getElementById('authModalTitle');
const registerFields = document.getElementById('registerFields');
const authName = document.getElementById('authName');
const authUsername = document.getElementById('authUsername');
const authPassword = document.getElementById('authPassword');
const authError = document.getElementById('authError');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const authCancelBtn = document.getElementById('authCancelBtn');
const authSwitchLink = document.getElementById('authSwitchLink');
const authSwitch = document.getElementById('authSwitch');

let authMode = 'login';

function updateAuthUI() {
  const user = DigiAuth.getUser();
  if (user) {
    authUserDisplay.textContent = user.name;
    authLoginBtn.style.display = 'none';
    authLogoutBtn.style.display = '';
  } else {
    authUserDisplay.textContent = '';
    authLoginBtn.style.display = '';
    authLogoutBtn.style.display = 'none';
  }
}

function showAuthModal(mode) {
  authMode = mode;
  authError.textContent = '';
  authUsername.value = '';
  authPassword.value = '';
  authName.value = '';
  if (mode === 'register') {
    authModalTitle.textContent = 'REGISTER';
    registerFields.style.display = '';
    authSubmitBtn.textContent = 'REGISTER';
    authSwitch.innerHTML = 'Have an account? <a id="authSwitchLink">Login</a>';
  } else {
    authModalTitle.textContent = 'LOGIN';
    registerFields.style.display = 'none';
    authSubmitBtn.textContent = 'LOGIN';
    authSwitch.innerHTML = 'No account? <a id="authSwitchLink">Register</a>';
  }
  document.getElementById('authSwitchLink').addEventListener('click', () => {
    showAuthModal(mode === 'login' ? 'register' : 'login');
  });
  authModal.classList.add('active');
}

authLoginBtn.addEventListener('click', () => showAuthModal('login'));
authLogoutBtn.addEventListener('click', () => {
  DigiAuth.logout();
  updateAuthUI();
});
authCancelBtn.addEventListener('click', () => authModal.classList.remove('active'));
authModal.addEventListener('click', (e) => {
  if (e.target === authModal) authModal.classList.remove('active');
});

authSubmitBtn.addEventListener('click', async () => {
  authError.textContent = '';
  const username = authUsername.value.trim();
  const password = authPassword.value;

  if (!username || !password) {
    authError.textContent = 'Fill in all fields';
    return;
  }

  authSubmitBtn.disabled = true;
  authSubmitBtn.textContent = '...';

  try {
    if (authMode === 'register') {
      const name = authName.value.trim();
      if (!name) {
        authError.textContent = 'Name is required';
        authSubmitBtn.disabled = false;
        authSubmitBtn.textContent = 'REGISTER';
        return;
      }
      await DigiAuth.register(name, username, password);
    } else {
      await DigiAuth.login(username, password);
    }
    authModal.classList.remove('active');
    updateAuthUI();
  } catch (err) {
    authError.textContent = err.message;
  }

  authSubmitBtn.disabled = false;
  authSubmitBtn.textContent = authMode === 'register' ? 'REGISTER' : 'LOGIN';
});

authPassword.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') authSubmitBtn.click();
});

updateAuthUI();
DigiAuth.verify().then(updateAuthUI);
</script>
</body>
</html>
