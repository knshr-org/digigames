<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Pipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1d26;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    font-family: 'Rubik', system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stage {
    position: relative;
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    max-width: 540px;
    max-height: 960px;
    background: #9fd4ea;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    cursor: pointer;
    will-change: transform;
  }
  @media (max-width: 600px) {
    #stage {
      max-width: 100vw;
      max-height: 100dvh;
      width: min(100vw, calc(100dvh * 9 / 16));
      height: min(100dvh, calc(100vw * 16 / 9));
      box-shadow: none;
      border-radius: 0;
    }
    #controls { display: none !important; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    #stage {
      width: calc(100dvh * 9 / 16);
      height: 100dvh;
      max-width: none;
      max-height: 100dvh;
    }
    #controls { display: none !important; }
  }
  #stage.shake { animation: shake 0.35s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes shake {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-6px, -2px); }
    20% { transform: translate(6px, 2px); }
    30% { transform: translate(-5px, 3px); }
    40% { transform: translate(5px, -3px); }
    50% { transform: translate(-3px, 2px); }
    60% { transform: translate(3px, -2px); }
    70% { transform: translate(-2px, 1px); }
    80% { transform: translate(2px, -1px); }
    90% { transform: translate(-1px, 0); }
  }
  svg { display: block; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  #startHint, #gameOverUI, #pauseUI {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #pauseUI, #gameOverUI { display: none; }
  .banner {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    opacity: 0;
    pointer-events: none;
  }
  .banner.show {
    animation: pop 1.4s ease-out forwards;
  }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-6deg); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
    40% { transform: translate(-50%, -50%) scale(0.95) rotate(-2deg); }
    60% { transform: translate(-50%, -50%) scale(1.02) rotate(1deg); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
  }
  @keyframes rotateSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .saw-blade { animation: rotateSpin 0.4s linear infinite; transform-origin: center; transform-box: fill-box; }
  .saw-blade.reverse { animation-direction: reverse; }
  .cloud { opacity: 0.92; }
  #obstacleLayer, #powerupLayer, #ballGroup, #trailLayer { will-change: transform; }
  .reduce-fx #ballInner { filter: none !important; }
  .reduce-fx #scoreText { filter: none !important; }

  /* Tweaks panel */
  #tweaks {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 260px;
    background: rgba(20, 22, 30, 0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 14px 12px;
    color: #eceef3;
    font-family: 'Rubik', system-ui, sans-serif;
    font-size: 12px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    z-index: 100;
    display: none;
  }
  #tweaks.active { display: block; }
  #tweaks h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9aa0ae;
    margin-bottom: 10px;
  }
  .tweak-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 8px;
  }
  .tweak-row label { flex: 1; color: #cdd1dc; font-weight: 500; }
  .tweak-row input[type="range"] {
    flex: 1.2; accent-color: #ff6b5b;
  }
  .tweak-row .val {
    font-variant-numeric: tabular-nums;
    color: #ff9a8a;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
    font-size: 11px;
  }
  .palette-row { display: flex; gap: 6px; margin-top: 2px; }
  .swatch {
    width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { border-color: #ffffff; }
  .hint {
    color: #6e7486; font-size: 10px; margin-top: 8px;
    text-align: center; letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<script>window.PIPES_API_BASE = '';</script>
<audio id="bgmAudio" loop preload="auto" style="display:none"></audio>

<div id="stage" tabindex="0" aria-label="Pipes game. Press space or tap to flap.">
  <!-- Main SVG -->
  <svg id="world" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <!-- Sky gradient (mutable via JS) -->
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop id="skyTop" offset="0" stop-color="#ffd3a8"/>
        <stop id="skyMid" offset="0.55" stop-color="#9fd4ea"/>
        <stop id="skyBot" offset="1" stop-color="#c6e9f2"/>
      </linearGradient>
      <!-- Ball gradient -->
      <radialGradient id="ballGrad" cx="0.35" cy="0.32" r="0.8">
        <stop offset="0" stop-color="#ffb6a9"/>
        <stop offset="0.55" stop-color="#ff6b5b"/>
        <stop offset="1" stop-color="#c13a2e"/>
      </radialGradient>
      <!-- Logo clip (ball is logo) -->
      <clipPath id="ballClip"><circle r="26"/></clipPath>
      <!-- Pipe gradient -->
      <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#2fa38b"/>
        <stop offset="0.5" stop-color="#44c4a9"/>
        <stop offset="1" stop-color="#1f7a68"/>
      </linearGradient>
      <linearGradient id="pipeGrad2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#d97845"/>
        <stop offset="0.5" stop-color="#f2a06b"/>
        <stop offset="1" stop-color="#a8522b"/>
      </linearGradient>
      <linearGradient id="pipeGrad3" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#6a4fb8"/>
        <stop offset="0.5" stop-color="#9779d6"/>
        <stop offset="1" stop-color="#4a358a"/>
      </linearGradient>
      <!-- Ground -->
      <pattern id="groundPat" x="0" y="0" width="40" height="24" patternUnits="userSpaceOnUse">
        <rect width="40" height="24" fill="#e8c98a"/>
        <path d="M0 20 L8 14 L16 20 L24 14 L32 20 L40 14" stroke="#c9a35a" stroke-width="2" fill="none"/>
      </pattern>
      <pattern id="grassPat" x="0" y="0" width="24" height="14" patternUnits="userSpaceOnUse">
        <rect width="24" height="14" fill="#7ac074"/>
        <path d="M4 14 L6 6 L8 14 M12 14 L14 4 L16 14 M20 14 L22 7 L24 14" stroke="#5ea758" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </pattern>
      <!-- Shadow filter for ball (lightweight) -->
      <filter id="ballShadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="3" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
      </filter>
      <!-- Score text outline -->
      <filter id="scoreShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
      </filter>
    </defs>

    <!-- Sky -->
    <rect id="skyRect" width="540" height="960" fill="url(#skyGrad)"/>

    <!-- Back layer: clouds -->
    <g id="cloudLayer"></g>

    <!-- Mid layer: distant hills -->
    <g id="hillLayer"></g>

    <!-- Obstacles -->
    <g id="obstacleLayer"></g>

    <!-- Power-ups -->
    <g id="powerupLayer"></g>

    <!-- Debug hitbox overlay (toggled via Tweaks) -->
    <g id="hitboxLayer" style="pointer-events:none;" opacity="0"></g>

    <!-- Front layer: grass + ground -->
    <g id="frontLayer">
      <rect id="grassBand" x="0" y="880" width="540" height="14" fill="url(#grassPat)"/>
      <rect id="groundBand" x="0" y="894" width="540" height="66" fill="url(#groundPat)"/>
    </g>

    <!-- Player ball trail -->
    <g id="trailLayer"></g>

    <!-- Player ball (logo badge) -->
    <g id="ballGroup" transform="translate(160 480)">
      <g id="ballInner" filter="url(#ballShadow)">
        <!-- Dark badge background so logo reads against sky -->
        <circle r="26" fill="#1e2129" stroke="#0c0e14" stroke-width="2.5"/>
        <!-- Logo image, clipped to circle -->
        <image id="ballImage" href="assets/player-logo.png" x="-24" y="-24" width="48" height="48"
               preserveAspectRatio="xMidYMid meet" clip-path="url(#ballClip)"/>
        <!-- subtle glossy highlight -->
        <ellipse cx="-9" cy="-12" rx="8" ry="4" fill="#ffffff" opacity="0.16"/>
      </g>
    </g>

    <!-- UI Layer -->
    <g id="uiLayer">
      <!-- Score -->
      <g id="scoreGroup" transform="translate(270 80)">
        <text id="scoreText" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="72"
              fill="#fff" stroke="#2a1a10" stroke-width="6" paint-order="stroke fill"
              filter="url(#scoreShadow)">0</text>
      </g>
      <!-- Best score pill -->
      <g id="bestGroup" transform="translate(540 40)">
        <rect x="-130" y="0" width="120" height="36" rx="18" fill="#20201f" opacity="0.78"/>
        <text x="-115" y="24" font-family="Rubik" font-weight="700" font-size="12" fill="#ffd66b"
              letter-spacing="1.2">BEST</text>
        <text id="bestText" x="-20" y="24" text-anchor="end" font-family="Rubik" font-weight="900"
              font-size="16" fill="#ffffff">0</text>
      </g>
      <!-- Tier pill -->
      <g id="tierGroup" transform="translate(10 40)">
        <rect id="tierPill" x="0" y="0" width="146" height="36" rx="18" fill="#20201f" opacity="0.82"/>
        <text x="14" y="24" font-family="Rubik" font-weight="700" font-size="12" fill="#8fdcc1"
              letter-spacing="1.6">TIER</text>
        <text id="tierNum" x="52" y="24" font-family="Rubik" font-weight="900" font-size="16" fill="#ffffff">1</text>
        <text id="tierFeatures" x="70" y="23" font-family="Rubik" font-weight="700" font-size="10" fill="#ffd66b"
              letter-spacing="1.3">PLAIN</text>
      </g>
      <!-- Active FX badges (row under tier pill) -->
      <g id="fxGroup" transform="translate(10 84)"></g>
    </g>

    <!-- Main menu -->
    <g id="menuG" opacity="1">
      <rect width="540" height="960" fill="#000" opacity="0.3"/>
      <rect x="90" y="260" width="360" height="380" rx="22" fill="#20201f" opacity="0.82"/>
      <text x="270" y="350" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="52" fill="#fff" letter-spacing="4">PIPES</text>
      <text x="270" y="385" text-anchor="middle" font-family="Rubik" font-weight="500" font-size="12" fill="#9aa0ae" letter-spacing="3">FLAPPY PIPES GAME</text>

      <!-- Start button -->
      <g id="menuStartBtn" style="cursor:pointer">
        <rect x="150" y="420" width="240" height="50" rx="25" fill="#ff6b5b"/>
        <text x="270" y="452" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="18" fill="#fff" letter-spacing="2">START</text>
      </g>

      <!-- Leaderboards button -->
      <g id="menuLeaderBtn" style="cursor:pointer">
        <rect x="150" y="485" width="240" height="50" rx="25" fill="#4aa8e8"/>
        <text x="270" y="517" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="18" fill="#fff" letter-spacing="2">LEADERBOARDS</text>
      </g>

      <!-- Settings button -->
      <g id="menuSettingsBtn" style="cursor:pointer">
        <rect x="150" y="550" width="240" height="50" rx="25" fill="#6e7486"/>
        <text x="270" y="582" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="18" fill="#fff" letter-spacing="2">SETTINGS</text>
      </g>
    </g>

    <!-- Leaderboard overlay -->
    <g id="leaderboardG" opacity="0" style="pointer-events:none">
      <rect width="540" height="960" fill="#000" opacity="0.55"/>
      <rect x="40" y="80" width="460" height="760" rx="24" fill="#fffbef" stroke="#2a1a10" stroke-width="4"/>
      <text x="270" y="140" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="32" fill="#2a1a10">LEADERBOARDS</text>
      <line x1="80" y1="160" x2="460" y2="160" stroke="#2a1a10" stroke-opacity="0.15" stroke-width="2"/>

      <!-- Tabs -->
      <g id="lbTabGlobal" style="cursor:pointer">
        <rect x="80" y="175" width="180" height="40" rx="12" fill="#ff6b5b"/>
        <text x="170" y="201" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="14" fill="#fff" letter-spacing="1">GLOBAL</text>
      </g>
      <g id="lbTabMine" style="cursor:pointer">
        <rect x="280" y="175" width="180" height="40" rx="12" fill="#cdd1dc"/>
        <text x="370" y="201" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="14" fill="#2a1a10" letter-spacing="1">MY SCORES</text>
      </g>

      <!-- Score rows container -->
      <g id="lbRows" transform="translate(0 230)"></g>

      <!-- Loading / error state -->
      <text id="lbStatus" x="270" y="450" text-anchor="middle" font-family="Rubik" font-weight="500" font-size="16" fill="#6e7486" opacity="0"></text>

      <!-- Back button -->
      <g id="lbBackBtn" style="cursor:pointer">
        <rect x="170" y="770" width="200" height="44" rx="22" fill="#ff6b5b"/>
        <text x="270" y="798" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">BACK</text>
      </g>
    </g>

    <!-- Settings overlay -->
    <g id="settingsG" opacity="0" style="pointer-events:none">
      <rect width="540" height="960" fill="#000" opacity="0.55"/>
      <rect x="70" y="260" width="400" height="380" rx="24" fill="#fffbef" stroke="#2a1a10" stroke-width="4"/>
      <text x="270" y="320" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="32" fill="#2a1a10">SETTINGS</text>
      <line x1="120" y1="340" x2="420" y2="340" stroke="#2a1a10" stroke-opacity="0.15" stroke-width="2"/>

      <!-- Music label + mute button -->
      <text x="120" y="385" font-family="Rubik" font-weight="700" font-size="16" fill="#2a1a10">MUSIC</text>
      <g id="bgmMuteBtn" style="cursor:pointer">
        <rect x="370" y="367" width="60" height="28" rx="14" fill="#44c4a9"/>
        <text id="bgmMuteText" x="400" y="386" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="11" fill="#fff">ON</text>
      </g>

      <!-- Music volume -->
      <rect x="120" y="400" width="310" height="8" rx="4" fill="#e0ddd4"/>
      <rect id="bgmFill" x="120" y="400" width="217" height="8" rx="4" fill="#44c4a9"/>
      <circle id="bgmKnob" cx="337" cy="404" r="14" fill="#fff" stroke="#44c4a9" stroke-width="3" style="cursor:pointer"/>

      <!-- SFX label + mute button -->
      <text x="120" y="470" font-family="Rubik" font-weight="700" font-size="16" fill="#2a1a10">SOUND FX</text>
      <g id="sfxMuteBtn" style="cursor:pointer">
        <rect x="370" y="452" width="60" height="28" rx="14" fill="#4aa8e8"/>
        <text id="sfxMuteText" x="400" y="471" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="11" fill="#fff">ON</text>
      </g>

      <!-- SFX volume -->
      <rect x="120" y="485" width="310" height="8" rx="4" fill="#e0ddd4"/>
      <rect id="sfxFill" x="120" y="485" width="248" height="8" rx="4" fill="#4aa8e8"/>
      <circle id="sfxKnob" cx="368" cy="489" r="14" fill="#fff" stroke="#4aa8e8" stroke-width="3" style="cursor:pointer"/>

      <!-- Back button -->
      <g id="settingsBackBtn" style="cursor:pointer">
        <rect x="170" y="540" width="200" height="44" rx="22" fill="#ff6b5b"/>
        <text x="270" y="568" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">BACK</text>
      </g>
    </g>

    <!-- Pause overlay -->
    <g id="pauseG" opacity="0" style="pointer-events:none">
      <rect width="540" height="960" fill="#000" opacity="0.45"/>
      <rect x="120" y="340" width="300" height="280" rx="22" fill="#20201f" opacity="0.9"/>
      <text x="270" y="410" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="42" fill="#fff">PAUSED</text>

      <!-- Resume button -->
      <g id="pauseResumeBtn" style="cursor:pointer">
        <rect x="170" y="440" width="200" height="44" rx="22" fill="#44c4a9"/>
        <text x="270" y="468" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">RESUME</text>
      </g>

      <!-- Menu button -->
      <g id="pauseMenuBtn" style="cursor:pointer">
        <rect x="170" y="500" width="200" height="44" rx="22" fill="#6e7486"/>
        <text x="270" y="528" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">MENU</text>
      </g>

      <!-- Quit confirm (hidden by default) -->
      <g id="pauseConfirmG" opacity="0" style="pointer-events:none">
        <text x="270" y="570" text-anchor="middle" font-family="Rubik" font-weight="500" font-size="12" fill="#cdd1dc">Quit to menu? Progress will be lost.</text>
        <g id="pauseConfirmYes" style="cursor:pointer">
          <rect x="150" y="580" width="110" height="36" rx="18" fill="#ff6b5b"/>
          <text x="205" y="604" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="13" fill="#fff">YES</text>
        </g>
        <g id="pauseConfirmNo" style="cursor:pointer">
          <rect x="280" y="580" width="110" height="36" rx="18" fill="#44c4a9"/>
          <text x="335" y="604" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="13" fill="#fff">NO</text>
        </g>
      </g>
    </g>

    <!-- Game over overlay -->
    <g id="gameOverG" opacity="0" style="pointer-events:none">
      <rect width="540" height="960" fill="#000" opacity="0.55"/>
      <rect x="50" y="200" width="440" height="540" rx="24" fill="#fffbef" stroke="#2a1a10" stroke-width="4"/>
      <text x="270" y="270" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="42" fill="#2a1a10" letter-spacing="1">GAME OVER</text>
      <line x1="100" y1="290" x2="440" y2="290" stroke="#2a1a10" stroke-opacity="0.15" stroke-width="2"/>

      <!-- Medal slot -->
      <g id="medalSlot" transform="translate(140 380)"></g>

      <g transform="translate(260 340)">
        <text font-family="Rubik" font-weight="500" font-size="14" fill="#6e7486" letter-spacing="2">SCORE</text>
        <text id="finalScore" y="38" font-family="Rubik" font-weight="900" font-size="38" fill="#2a1a10">0</text>
        <text y="72" font-family="Rubik" font-weight="500" font-size="14" fill="#6e7486" letter-spacing="2">BEST</text>
        <text id="finalBest" y="100" font-family="Rubik" font-weight="900" font-size="24" fill="#ff6b5b">0</text>
      </g>

      <!-- Name input area (foreignObject for HTML input inside SVG) -->
      <foreignObject x="100" y="470" width="340" height="45">
        <input id="scoreNameInput" type="text" maxlength="20" placeholder="Enter your name"
          style="width:100%;height:40px;border:2px solid #cdd1dc;border-radius:12px;padding:0 14px;
          font-family:Rubik,sans-serif;font-size:15px;font-weight:600;color:#2a1a10;background:#fff;
          outline:none;box-sizing:border-box;" />
      </foreignObject>

      <!-- Submit button -->
      <g id="goSubmitBtn" style="cursor:pointer">
        <rect x="100" y="525" width="340" height="44" rx="22" fill="#44c4a9"/>
        <text id="goSubmitText" x="270" y="553" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">SUBMIT SCORE</text>
      </g>

      <!-- Retry button -->
      <g id="goRetryBtn" style="cursor:pointer">
        <rect x="100" y="585" width="160" height="44" rx="22" fill="#ff6b5b"/>
        <text x="180" y="613" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">RETRY</text>
      </g>

      <!-- Menu button -->
      <g id="goMenuBtn" style="cursor:pointer">
        <rect x="280" y="585" width="160" height="44" rx="22" fill="#6e7486"/>
        <text x="360" y="613" text-anchor="middle" font-family="Rubik" font-weight="700" font-size="15" fill="#fff" letter-spacing="1.5">MENU</text>
      </g>
    </g>

    <!-- Milestone banner -->
    <g id="bannerG" opacity="0"></g>
  </svg>

  <div id="controls" style="position:absolute; top:12px; left:12px; display:flex; gap:6px; pointer-events:none;">

    <div style="background:rgba(0,0,0,0.35); color:#fff; padding:4px 9px; border-radius:10px; font-size:10px; letter-spacing:1.5px; font-weight:600;">P · PAUSE</div>
    <div style="background:rgba(0,0,0,0.35); color:#fff; padding:4px 9px; border-radius:10px; font-size:10px; letter-spacing:1.5px; font-weight:600;">R · RESET</div>

</div>

<!-- Tweaks panel -->

<script>
// ===== Tweakable defaults (persisted via EDITMODE block) =====
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "gravity": 0.45,
  "flap": 8,
  "baseSpeed": 2.25,
  "gapSize": 220,
  "ballPalette": "coral",
  "startTier": 1,
  "showHitboxes": false
}/*EDITMODE-END*/;

const BALL_PALETTES = {
  coral:   { light: '#ffb6a9', mid: '#ff6b5b', dark: '#c13a2e', stroke: '#7a1e15' },
  citron:  { light: '#fff3a3', mid: '#ffd447', dark: '#b38800', stroke: '#6b5200' },
  ocean:   { light: '#a3e0ff', mid: '#4aa8e8', dark: '#1f5f99', stroke: '#133a5c' },
  violet:  { light: '#e0b6ff', mid: '#a06bdc', dark: '#5a3a8a', stroke: '#32205a' },
  mint:    { light: '#b6f0d4', mid: '#4dcf8d', dark: '#1f7a4d', stroke: '#0f3e27' }
};

// ===== Edit mode protocol =====
let editActive = false;
const tweaks = { ...TWEAK_DEFAULTS };

window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === '__activate_edit_mode') {
    editActive = true;
    document.getElementById('tweaks').classList.add('active');
  } else if (d.type === '__deactivate_edit_mode') {
    editActive = false;
    document.getElementById('tweaks').classList.remove('active');
  }
});
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}

function persistTweak(key, value) {
  tweaks[key] = value;
  try {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  } catch (e) {}
}

// ===== Game constants =====
const W = 540, H = 960;
const GROUND_Y = 880;
const BALL_X = 160;
const BALL_R = 22;

// ===== State =====
const state = {
  mode: 'menu',         // 'menu' | 'play' | 'pause' | 'over'
  ball: { x: BALL_X, y: 480, vy: 0, rot: 0 },
  obstacles: [],
  powerups: [],         // floating collectibles
  fx: { shield: 0, slowmo: 0, x2: 0 },  // remaining ms / pipes
  score: 0,
  best: 0,
  scrollX: 0,
  spawnTimer: 0,
  shown: {},            // milestones shown
  trail: [],
  clouds: [],
  hills: [],
  lastT: 0,
  time: 0
};
state.best = parseInt(localStorage.getItem('pipes_best_score')) || 0;

// ===== Tier config =====
function tierFor(score) {
  if (score < 5)  return { id: 1, speed: 3,   interval: 1600, gap: 170, color: 'url(#pipeGrad)',  moving: false, spikes: false, saw: false };
  if (score < 10) return { id: 2, speed: 4,   interval: 1400, gap: 145, color: 'url(#pipeGrad2)', moving: false, spikes: false, saw: false };
  if (score < 15) return { id: 3, speed: 5,   interval: 1250, gap: 135, color: 'url(#pipeGrad)',  moving: true,  spikes: false, saw: false };
  if (score < 20) return { id: 4, speed: 6,   interval: 1100, gap: 125, color: 'url(#pipeGrad2)', moving: true,  spikes: true,  saw: false };
  return             { id: 5, speed: 7,   interval: 950,  gap: 120, color: 'url(#pipeGrad3)', moving: true,  spikes: true,  saw: true  };
}

// Update the tier HUD pill — shows current tier + its hazards.
let _lastTierShown = -1;
function updateTierHUD(score) {
  const t = tierFor(score);
  if (t.id === _lastTierShown) return;
  _lastTierShown = t.id;
  const numEl = document.getElementById('tierNum');
  const featEl = document.getElementById('tierFeatures');
  if (!numEl || !featEl) return;
  numEl.textContent = t.id;
  const feats = [];
  if (t.moving) feats.push('MOVING');
  if (t.spikes) feats.push('SPIKES');
  if (t.saw)    feats.push('SAWS');
  featEl.textContent = feats.length ? '• ' + feats.join(' • ') : 'PLAIN';
  // flash the pill on tier change
  const pill = document.getElementById('tierPill');
  if (pill) {
    pill.setAttribute('fill', '#ff6b5b');
    setTimeout(() => pill.setAttribute('fill', '#20201f'), 450);
  }
}

// ===== DOM refs =====
const world = document.getElementById('world');
const stage = document.getElementById('stage');
const ballGroup = document.getElementById('ballGroup');
const ballInner = document.getElementById('ballInner');
const obstacleLayer = document.getElementById('obstacleLayer');
const powerupLayer = document.getElementById('powerupLayer');
const trailLayer = document.getElementById('trailLayer');
const cloudLayer = document.getElementById('cloudLayer');
const hillLayer = document.getElementById('hillLayer');
const groundBand = document.getElementById('groundBand');
const grassBand = document.getElementById('grassBand');
const scoreText = document.getElementById('scoreText');
const bestText = document.getElementById('bestText');
const finalScore = document.getElementById('finalScore');
const finalBest = document.getElementById('finalBest');
const menuG = document.getElementById('menuG');
const leaderboardG = document.getElementById('leaderboardG');
const settingsG = document.getElementById('settingsG');
const scoreNameInput = document.getElementById('scoreNameInput');
const pauseG = document.getElementById('pauseG');
const gameOverG = document.getElementById('gameOverG');
const bannerG = document.getElementById('bannerG');
const medalSlot = document.getElementById('medalSlot');
const hitboxLayer = document.getElementById('hitboxLayer');

// ===== Performance detection =====
const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
const IS_LOW_POWER = IS_MOBILE || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4);
if (IS_LOW_POWER) document.getElementById('stage').classList.add('reduce-fx');

// ===== Trail pool (pre-allocated SVG circles) =====
const TRAIL_POOL_SIZE = 8;
const trailPool = [];
function initTrailPool() {
  for (let i = 0; i < TRAIL_POOL_SIZE; i++) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', '0');
    c.setAttribute('cy', '0');
    c.setAttribute('r', '0');
    c.setAttribute('fill', '#ff6b5b');
    c.setAttribute('opacity', '0');
    trailLayer.appendChild(c);
    trailPool.push(c);
  }
}

// ===== Init scenery =====
function initClouds() {
  state.clouds = [];
  cloudLayer.innerHTML = '';
  const cloudCount = IS_LOW_POWER ? 3 : 6;
  for (let i = 0; i < cloudCount; i++) {
    const c = { x: Math.random() * W, y: 60 + Math.random() * 300, s: 0.7 + Math.random() * 0.8 };
    state.clouds.push(c);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'cloud');
    g.innerHTML = `
      <ellipse cx="0" cy="0" rx="${36*c.s}" ry="${14*c.s}" fill="#ffffff" opacity="0.85"/>
      <ellipse cx="-20" cy="5" rx="${22*c.s}" ry="${10*c.s}" fill="#ffffff" opacity="0.85"/>
      <ellipse cx="22" cy="4" rx="${24*c.s}" ry="${11*c.s}" fill="#ffffff" opacity="0.85"/>
    `;
    cloudLayer.appendChild(g);
    c.el = g;
  }
}

function initHills() {
  state.hills = [];
  hillLayer.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const h = { x: i * 180 - 40, y: 700, w: 260, h: 180 };
    state.hills.push(h);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    g.setAttribute('fill', '#6ea89a');
    g.setAttribute('opacity', '0.85');
    hillLayer.appendChild(g);
    h.el = g;
  }
  renderHills();
}
function renderHills() {
  state.hills.forEach(h => {
    const x = h.x, y = h.y, w = h.w;
    h.el.setAttribute('d', `M ${x} 880 Q ${x + w/2} ${y - 40} ${x + w} 880 Z`);
  });
}

// ===== Pesky pipe-dweller (the annoying guy) =====
// Original character: red beanie, big mustache, green scarf, blue overalls.
// Not Mario. Pops out of a pipe to wave/point at you. Purely decorative.
function peskyGuySVG() {
  return `
    <g class="pesky-body">
      <!-- overalls/body -->
      <rect x="-14" y="8" width="28" height="22" rx="3" fill="#2d5ec9" stroke="#0c1f4a" stroke-width="2"/>
      <rect x="-10" y="6" width="6" height="10" rx="1.5" fill="#2d5ec9" stroke="#0c1f4a" stroke-width="2"/>
      <rect x="4" y="6" width="6" height="10" rx="1.5" fill="#2d5ec9" stroke="#0c1f4a" stroke-width="2"/>
      <!-- yellow buttons -->
      <circle cx="-7" cy="16" r="1.8" fill="#ffd44a" stroke="#8a6814" stroke-width="1"/>
      <circle cx="7" cy="16" r="1.8" fill="#ffd44a" stroke="#8a6814" stroke-width="1"/>
      <!-- arm + waving hand (animated) -->
      <g class="pesky-arm" style="transform-origin: -10px 10px;">
        <rect x="-20" y="8" width="8" height="4" rx="2" fill="#2d5ec9" stroke="#0c1f4a" stroke-width="2"/>
        <circle cx="-22" cy="10" r="4" fill="#f5c79a" stroke="#6b3a1e" stroke-width="2"/>
      </g>
      <!-- head -->
      <circle cx="0" cy="-4" r="11" fill="#f5c79a" stroke="#6b3a1e" stroke-width="2"/>
      <!-- mustache (thick, bushy) -->
      <path d="M -8 2 Q -5 6 0 4 Q 5 6 8 2 Q 6 -1 3 0 Q 0 1 -3 0 Q -6 -1 -8 2 Z" fill="#3a1f0c" stroke="#1a0a00" stroke-width="1"/>
      <!-- nose -->
      <ellipse cx="0" cy="-1" rx="2.5" ry="2" fill="#e8a678" stroke="#8a4e28" stroke-width="1"/>
      <!-- eyes -->
      <circle cx="-4" cy="-6" r="1.5" fill="#1a1a1a"/>
      <circle cx="4" cy="-6" r="1.5" fill="#1a1a1a"/>
      <!-- beanie (not a branded cap: rounded beanie with pom) -->
      <path d="M -11 -6 Q -12 -16 0 -17 Q 12 -16 11 -6 Z" fill="#e04436" stroke="#6b1e12" stroke-width="2"/>
      <rect x="-11.5" y="-7" width="23" height="3" fill="#b82f24" stroke="#6b1e12" stroke-width="1.5"/>
      <circle cx="0" cy="-18" r="2.5" fill="#ffd44a" stroke="#8a6814" stroke-width="1"/>
    </g>
  `;
}

const SVG_NS = 'http://www.w3.org/2000/svg';

// ===== Obstacles =====
let obsIdCounter = 0;
function spawnObstacle() {
  const t = tierFor(state.score);
  const gap = tweaks.gapSize != null ? Math.max(100, tweaks.gapSize - (t.id - 1) * 8) : t.gap;
  const margin = 120;
  const gapY = margin + Math.random() * (GROUND_Y - margin * 2 - gap);
  const ob = {
    id: ++obsIdCounter,
    x: W + 40,
    topY: 0, topH: gapY,
    botY: gapY + gap, botH: GROUND_Y - (gapY + gap),
    gapY, gap,
    baseGapY: gapY,
    color: t.color,
    moving: t.moving,
    spikes: t.spikes,
    saw: t.saw,
    tier: t.id,
    phase: Math.random() * Math.PI * 2,
    amp: t.moving ? 50 : 0,
    scored: false
  };
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('data-id', ob.id);

  // Top pipe body
  const topPipe = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  topPipe.classList.add('top-pipe');
  const pipeW = 70;
  topPipe.innerHTML = `
    <rect x="-${pipeW/2}" y="0" width="${pipeW}" height="${ob.topH - 20}" fill="${t.color}" stroke="#1a3d33" stroke-width="3"/>
    <rect x="-${pipeW/2 + 6}" y="${ob.topH - 22}" width="${pipeW + 12}" height="24" rx="3" fill="${t.color}" stroke="#1a3d33" stroke-width="3"/>
    ${t.spikes ? spikes(pipeW, ob.topH - 2, 'down') : ''}
  `;

  // Bottom pipe body
  const botPipe = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  botPipe.classList.add('bot-pipe');
  botPipe.innerHTML = `
    <rect x="-${pipeW/2 + 6}" y="${ob.botY}" width="${pipeW + 12}" height="24" rx="3" fill="${t.color}" stroke="#1a3d33" stroke-width="3"/>
    <rect x="-${pipeW/2}" y="${ob.botY + 22}" width="${pipeW}" height="${ob.botH - 22}" fill="${t.color}" stroke="#1a3d33" stroke-width="3"/>
    ${t.spikes ? spikes(pipeW, ob.botY + 2, 'up') : ''}
  `;

  g.appendChild(topPipe);
  g.appendChild(botPipe);

  // Saw blade in middle of gap
  if (t.saw) {
    const saw = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    saw.setAttribute('class', 'saw-blade' + (Math.random() > 0.5 ? ' reverse' : ''));
    saw.setAttribute('transform', `translate(0 ${ob.gapY + ob.gap/2})`);
    saw.innerHTML = sawSVG(22);
    g.appendChild(saw);
    ob.sawEl = saw;
    ob.sawR = 22;
  }

  obstacleLayer.appendChild(g);
  ob.el = g;
  ob.topEl = topPipe;
  ob.botEl = botPipe;

  // Cache direct refs for moving pipe updates (avoids querySelectorAll per frame)
  const topRects = topPipe.querySelectorAll('rect');
  ob._topBody = topRects[0] || null;
  ob._topLip = topRects[1] || null;
  ob._topSpikes = topPipe.querySelector('path');
  const botRects = botPipe.querySelectorAll('rect');
  ob._botLip = botRects[0] || null;
  ob._botBody = botRects[1] || null;
  ob._botSpikes = botPipe.querySelector('path');

  // Pesky guy: ~22% chance. Emerges from the top lip of the bottom pipe, waves, ducks back.
  // Clipped to the area ABOVE the pipe lip so he's fully hidden while tucked inside.
  if (Math.random() < 0.22) {
    const peskyG = document.createElementNS(SVG_NS, 'g');
    peskyG.setAttribute('class', 'pesky');
    peskyG.innerHTML = peskyGuySVG();
    // Mount point: the top line of the bottom pipe lip (where he emerges from)
    const mountY = ob.gapY + ob.gap;
    // Clip path: only pixels ABOVE mountY are visible. When tucked below, he's invisible.
    const clipId = `peskyClip-${ob.id}`;
    const clip = document.createElementNS(SVG_NS, 'clipPath');
    clip.setAttribute('id', clipId);
    const clipRect = document.createElementNS(SVG_NS, 'rect');
    clipRect.setAttribute('x', '-40');
    clipRect.setAttribute('y', '-600');
    clipRect.setAttribute('width', '80');
    clipRect.setAttribute('height', '600');  // area above mountY (y=0 in wrap coords)
    clip.appendChild(clipRect);
    g.appendChild(clip);
    const clipWrap = document.createElementNS(SVG_NS, 'g');
    clipWrap.setAttribute('clip-path', `url(#${clipId})`);
    clipWrap.setAttribute('transform', `translate(0 ${mountY})`);
    clipWrap.appendChild(peskyG);
    // Hidden initial position: translate down so his entire body is below mountY (clipped out)
    peskyG.setAttribute('transform', `translate(0 40)`);
    g.appendChild(clipWrap);
    ob.pesky = {
      el: peskyG,
      wrap: clipWrap,
      mountY,
      state: 'waiting',   // waiting -> rising -> waving -> retreating -> done
      t: 0,
      // Trigger when pipe gets close to the ball
      triggerX: BALL_X + 140 + Math.random() * 80
    };
  }

  state.obstacles.push(ob);

  // Random power-up — rarer at low tiers, more common at high tiers where you need the help
  const tierRates = { 1: 0, 2: 0.08, 3: 0.18, 4: 0.32, 5: 0.42 };
  const rate = tierRates[t.id] ?? 0.25;
  if (Math.random() < rate) {
    maybeSpawnPowerup(ob);
  }
}

// ===== Power-ups =====
const POWERUPS = {
  shield: { color: '#6fd4ff', stroke: '#1a5a82', label: 'SHIELD',  icon: 'shield' },
  slow:   { color: '#b78cff', stroke: '#4b2f8a', label: 'SLOW-MO', icon: 'clock' },
  x2:     { color: '#ffd44a', stroke: '#8a6814', label: '2X',      icon: 'star' }
};
const POWERUP_KEYS = Object.keys(POWERUPS);

function powerupIconSVG(kind) {
  if (kind === 'shield') {
    return `<path d="M 0 -12 L 10 -6 L 10 4 Q 10 12 0 16 Q -10 12 -10 4 L -10 -6 Z"
             fill="#fff" stroke="#1a1a1a" stroke-width="1.8" stroke-linejoin="round"/>`;
  }
  if (kind === 'clock') {
    return `<circle r="10" fill="#fff" stroke="#1a1a1a" stroke-width="1.8"/>
            <line x1="0" y1="0" x2="0" y2="-7" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <line x1="0" y1="0" x2="5" y2="2" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>`;
  }
  if (kind === 'star') {
    let p = '';
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI/2;
      const r = i % 2 === 0 ? 11 : 4.5;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      p += (i === 0 ? 'M ' : 'L ') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    p += 'Z';
    return `<path d="${p}" fill="#fff" stroke="#1a1a1a" stroke-width="1.8" stroke-linejoin="round"/>`;
  }
  return '';
}

const fxGroup = document.getElementById('fxGroup');

function updateFXHUD() {
  if (!fxGroup) return;
  const badges = [];
  if (state.fx.shield > 0) badges.push({ color: '#6fd4ff', stroke: '#1a5a82', label: 'SHIELD', icon: 'shield' });
  if (state.fx.slowmo > 0) badges.push({ color: '#b78cff', stroke: '#4b2f8a', label: Math.ceil(state.fx.slowmo/1000) + 's', icon: 'clock' });
  if (state.fx.x2 > 0)     badges.push({ color: '#ffd44a', stroke: '#8a6814', label: '2X ×' + state.fx.x2, icon: 'star' });
  let x = 0;
  fxGroup.innerHTML = badges.map(bd => {
    const w = 78, h = 32;
    const g = `<g transform="translate(${x} 0)">
      <rect x="0" y="0" width="${w}" height="${h}" rx="16" fill="${bd.color}" stroke="${bd.stroke}" stroke-width="2" opacity="0.96"/>
      <g transform="translate(14 ${h/2}) scale(0.75)">${powerupIconSVG(bd.icon)}</g>
      <text x="${w - 10}" y="${h/2 + 5}" text-anchor="end" font-family="Rubik" font-weight="900" font-size="13"
            fill="#0c0e14">${bd.label}</text>
    </g>`;
    x += w + 8;
    return g;
  }).join('');
}

function maybeSpawnPowerup(ob) {
  const kind = POWERUP_KEYS[Math.floor(Math.random() * POWERUP_KEYS.length)];
  const conf = POWERUPS[kind];
  // Place it between this obstacle and the next — roughly a pipe-interval to the right,
  // vertically centered in THIS obstacle's gap (easy to aim for).
  const gY = ob.gapY + ob.gap / 2;
  const x = ob.x + 220 + Math.random() * 60;
  const pu = {
    kind, x, y: gY,
    baseY: gY,
    phase: Math.random() * Math.PI * 2,
    collected: false
  };
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('class', 'powerup');
  if (IS_LOW_POWER) {
    g.innerHTML = `
      <circle r="24" fill="${conf.color}" stroke="${conf.stroke}" stroke-width="3" opacity="0.95"/>
      <circle r="24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.45"/>
      ${powerupIconSVG(conf.icon)}
    `;
  } else {
    g.innerHTML = `
      <circle class="pu-halo" r="34" fill="${conf.color}" opacity="0.22"/>
      <circle class="pu-ring" r="27" fill="none" stroke="${conf.color}" stroke-width="2" opacity="0.7"/>
      <circle r="22" fill="${conf.color}" stroke="${conf.stroke}" stroke-width="3" opacity="0.98"/>
      <circle r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
      <g class="pu-rays" opacity="0.85">
        <line x1="0" y1="-30" x2="0" y2="-24" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="0" y1="30"  x2="0" y2="24"  stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="-30" y1="0" x2="-24" y2="0" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="30" y1="0"  x2="24" y2="0"  stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </g>
      ${powerupIconSVG(conf.icon)}
    `;
    pu.haloEl = g.querySelector('.pu-halo');
    pu.ringEl = g.querySelector('.pu-ring');
    pu.raysEl = g.querySelector('.pu-rays');
  }
  pu.el = g;
  powerupLayer.appendChild(g);
  state.powerups.push(pu);
}

function collectPowerup(pu) {
  pu.collected = true;
  AudioManager.playSFX('powerup');
  if (pu.kind === 'shield') state.fx.shield = Math.max(state.fx.shield, 1); // 1 hit
  if (pu.kind === 'slow')   state.fx.slowmo = 3200; // ms
  if (pu.kind === 'x2')     state.fx.x2 = 5; // next 5 pipes
  // Little flash: pop the powerup
  pu.el.innerHTML = `<circle r="30" fill="#fff" opacity="0.8"><animate attributeName="r" from="22" to="60" dur="0.35s" fill="freeze"/><animate attributeName="opacity" from="0.9" to="0" dur="0.35s" fill="freeze"/></circle>`;
  setTimeout(() => { if (pu.el && pu.el.parentNode) pu.el.parentNode.removeChild(pu.el); }, 400);
  updateFXHUD();
}

function spikes(pipeW, y, dir) {
  const n = 7, step = (pipeW + 8) / n;
  let path = '';
  for (let i = 0; i < n; i++) {
    const x1 = -pipeW/2 - 4 + i * step;
    const x2 = x1 + step;
    const mx = (x1 + x2) / 2;
    if (dir === 'down') {
      path += `M ${x1} ${y} L ${mx} ${y + 26} L ${x2} ${y} Z `;
    } else {
      path += `M ${x1} ${y} L ${mx} ${y - 26} L ${x2} ${y} Z `;
    }
  }
  return `<path d="${path}" fill="#e04436" stroke="#5b170d" stroke-width="2.5" stroke-linejoin="miter"/>`;
}

function sawSVG(r) {
  const teeth = 10;
  let path = '';
  for (let i = 0; i < teeth; i++) {
    const a1 = (i / teeth) * Math.PI * 2;
    const a2 = ((i + 0.5) / teeth) * Math.PI * 2;
    const a3 = ((i + 1) / teeth) * Math.PI * 2;
    const r1 = r, r2 = r + 6;
    const p1 = [Math.cos(a1) * r1, Math.sin(a1) * r1];
    const p2 = [Math.cos(a2) * r2, Math.sin(a2) * r2];
    const p3 = [Math.cos(a3) * r1, Math.sin(a3) * r1];
    if (i === 0) path += `M ${p1[0]} ${p1[1]} `;
    path += `L ${p2[0]} ${p2[1]} L ${p3[0]} ${p3[1]} `;
  }
  path += 'Z';
  return `
    <path d="${path}" fill="#cdd1dc" stroke="#2a2a2a" stroke-width="2"/>
    <circle r="8" fill="#ff6b5b" stroke="#2a2a2a" stroke-width="2"/>
    <circle r="2" fill="#2a2a2a"/>
  `;
}

// ===== Sky transition by score =====
function updateSky(score) {
  const stops = {
    0:  ['#ffd3a8', '#9fd4ea', '#c6e9f2'],     // dawn
    10: ['#ffb58a', '#7ab8d4', '#a6d4e0'],     // day
    20: ['#e88a6b', '#5a7db4', '#6b88a8'],     // dusk
    25: ['#3d3a6e', '#22264d', '#14163a']      // night
  };
  const keys = [0, 10, 20, 25];
  let lo = 0, hi = 25;
  for (let i = 0; i < keys.length - 1; i++) {
    if (score >= keys[i] && score < keys[i+1]) { lo = keys[i]; hi = keys[i+1]; break; }
    if (score >= keys[keys.length-1]) { lo = hi = keys[keys.length-1]; }
  }
  const t = lo === hi ? 0 : (score - lo) / (hi - lo);
  const a = stops[lo], b = stops[hi];
  const mix = (c1, c2, t) => {
    const p = (h) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [r1,g1,b1] = p(c1), [r2,g2,b2] = p(c2);
    const r = Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), bl=Math.round(b1+(b2-b1)*t);
    return `rgb(${r},${g},${bl})`;
  };
  document.getElementById('skyTop').setAttribute('stop-color', mix(a[0], b[0], t));
  document.getElementById('skyMid').setAttribute('stop-color', mix(a[1], b[1], t));
  document.getElementById('skyBot').setAttribute('stop-color', mix(a[2], b[2], t));
}

// ===== Collision =====
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX, dy = cy - closestY;
  return dx*dx + dy*dy < cr*cr;
}
function circleCircle(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx*dx + dy*dy < (r1 + r2) * (r1 + r2);
}
function consumeShieldIfAny() {
  if (state.fx.shield > 0) {
    state.fx.shield = 0;
    // Brief invulnerability flash to prevent immediate re-hit
    state.fx.iframes = 600;
    updateFXHUD();
    // Visual ping on the ball
    const ping = document.createElementNS(SVG_NS, 'circle');
    ping.setAttribute('r', '30');
    ping.setAttribute('fill', 'none');
    ping.setAttribute('stroke', '#6fd4ff');
    ping.setAttribute('stroke-width', '4');
    ping.innerHTML = `<animate attributeName="r" from="26" to="60" dur="0.4s" fill="freeze"/><animate attributeName="opacity" from="1" to="0" dur="0.4s" fill="freeze"/>`;
    ballGroup.appendChild(ping);
    setTimeout(() => ping.remove(), 450);
    return true;
  }
  return false;
}

function checkCollision() {
  const b = state.ball;
  // Invulnerability frames after shield pop
  if (state.fx.iframes && state.fx.iframes > 0) return false;
  // Ground (shield doesn't save you from ground)
  if (b.y + BALL_R >= GROUND_Y) {
    if (consumeShieldIfAny()) { b.y = GROUND_Y - BALL_R - 4; b.vy = -8; return false; }
    return true;
  }
  // Ceiling
  if (b.y - BALL_R <= 0) { b.y = BALL_R; b.vy = 0; }
  const pipeW = 70;
  // Slight inset so you can graze the pipe sides without dying — feels fairer, especially with spikes.
  const HIT_INSET = 5;
  const hx = pipeW - HIT_INSET * 2;
  for (const ob of state.obstacles) {
    const px = ob.x - pipeW/2 + HIT_INSET;
    // Top pipe body + lip
    if (circleRect(b.x, b.y, BALL_R - 3, px, 0, hx, ob.gapY)) {
      if (consumeShieldIfAny()) return false;
      return true;
    }
    // Bottom pipe body + lip
    if (circleRect(b.x, b.y, BALL_R - 3, px, ob.gapY + ob.gap, hx, GROUND_Y - (ob.gapY + ob.gap))) {
      if (consumeShieldIfAny()) return false;
      return true;
    }
    // Spikes: pointy triangles. Approximate each as a SMALL circle at ~1/3 the way down the spike
    // (so only the tip kills — base is the pipe lip, which the rect above already covers).
    if (ob.spikes) {
      const n = 7, step = (pipeW + 8) / n;
      const spikeR = 4; // small forgiving hitbox per spike
      for (let s = 0; s < n; s++) {
        const mx = ob.x - pipeW/2 - 4 + step * (s + 0.5);
        // Top pipe's down-pointing spike tip sits at ob.gapY + 24 (visually the tip).
        // Use a point 2/3 down the spike so a near-miss at the tip is survivable.
        const topTipY = ob.gapY + 16;
        if (circleCircle(b.x, b.y, BALL_R - 4, mx, topTipY, spikeR)) {
          if (consumeShieldIfAny()) return false;
          return true;
        }
        // Bottom pipe's up-pointing spike tip sits at ob.gapY + ob.gap - 24.
        const botTipY = ob.gapY + ob.gap - 16;
        if (circleCircle(b.x, b.y, BALL_R - 4, mx, botTipY, spikeR)) {
          if (consumeShieldIfAny()) return false;
          return true;
        }
      }
    }
    // saw in middle
    if (ob.saw) {
      if (circleCircle(b.x, b.y, BALL_R - 3, ob.x, ob.gapY + ob.gap/2, ob.sawR - 3)) {
        if (consumeShieldIfAny()) return false;
        return true;
      }
    }
    // Pesky guy: only lethal once he's out (rising/waving). His head is the hitbox.
    // Additionally: only count the parts ABOVE the pipe lip (mountY) as collidable,
    // since everything below mountY is visually clipped away.
    if (ob.pesky && (ob.pesky.state === 'rising' || ob.pesky.state === 'waving')) {
      const tr = ob.pesky.el.getAttribute('transform') || '';
      const m = tr.match(/translate\(0 (-?\d+(?:\.\d+)?)\)/);
      const off = m ? parseFloat(m[1]) : 40;
      const headY = ob.pesky.mountY + off - 4;
      const headR = 11;
      // Head only collides if it's visually above the pipe lip (fully emerged head).
      if (headY + headR < ob.pesky.mountY &&
          circleCircle(b.x, b.y, BALL_R - 2, ob.x, headY, headR)) {
        if (consumeShieldIfAny()) return false;
        return true;
      }
      // Body: clip the rect so only the part above mountY (visible) counts.
      const bodyTop = ob.pesky.mountY + off + 8;   // head-to-body boundary
      const bodyBot = ob.pesky.mountY + off + 30;
      const visBot = Math.min(bodyBot, ob.pesky.mountY); // don't extend below pipe lip
      if (visBot > bodyTop + 2 && // have at least a couple pixels of visible body
          circleRect(b.x, b.y, BALL_R - 2, ob.x - 12, bodyTop, 24, visBot - bodyTop)) {
        if (consumeShieldIfAny()) return false;
        return true;
      }
    }
  }
  return false;
}

const MILESTONES = [
  { at: 5,  text: 'NICE!',    col: '#ffd66b' },
  { at: 10, text: 'GREAT!',   col: '#ff9a8a' },
  { at: 15, text: 'PRO!',     col: '#9779d6' },

  { at: 25, text: 'LEGEND!', col: '#44c4a9' }
];
function showBanner(m) {
  bannerG.innerHTML = `
    <rect x="90" y="280" width="360" height="90" rx="18" fill="${m.col}" stroke="#2a1a10" stroke-width="4"/>
    <text x="270" y="340" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="52"
          fill="#fff" stroke="#2a1a10" stroke-width="5" paint-order="stroke fill">${m.text}</text>
  `;
  bannerG.style.opacity = 1;
  bannerG.setAttribute('opacity', '1');
  // reset animation
  bannerG.style.animation = 'none';
  void bannerG.getBoundingClientRect();
  bannerG.style.animation = 'pop 1.6s ease-out forwards';
}
// drive banner via JS animation since SVG g doesn't support css animation inheritance well
let bannerStart = 0, bannerActive = false;
function triggerBanner(m) {
  bannerG.innerHTML = `
    <g transform="translate(270 330)">
      <rect x="-180" y="-45" width="360" height="90" rx="18" fill="${m.col}" stroke="#2a1a10" stroke-width="4"/>
      <text y="18" text-anchor="middle" font-family="Rubik" font-weight="900" font-size="52"
            fill="#fff" stroke="#2a1a10" stroke-width="5" paint-order="stroke fill">${m.text}</text>
    </g>
  `;
  bannerStart = performance.now();
  bannerActive = true;
  bannerG.setAttribute('opacity', '1');
}
function updateBanner(now) {
  if (!bannerActive) return;
  const t = (now - bannerStart) / 1700;
  if (t >= 1) {
    bannerActive = false;
    bannerG.setAttribute('opacity', '0');
    bannerG.innerHTML = '';
    return;
  }
  let scale, alpha, ty;
  if (t < 0.2) {
    const k = t / 0.2;
    scale = 0.5 + k * 0.7;
    alpha = k;
    ty = 0;
  } else if (t < 0.75) {
    scale = 1.2 - (t - 0.2) / 0.55 * 0.2;
    alpha = 1;
    ty = 0;
  } else {
    const k = (t - 0.75) / 0.25;
    scale = 1;
    alpha = 1 - k;
    ty = -k * 30;
  }
  bannerG.setAttribute('opacity', alpha);
  const firstG = bannerG.querySelector('g');
  if (firstG) firstG.setAttribute('transform', `translate(270 ${330 + ty}) scale(${scale})`);
}

}

  state.trail.push({ x: state.ball.x, y: state.ball.y, t: performance.now() });

function update(dt, now) {
  if (state.mode !== 'play') return;
  // Normalize to 60fps: on 120Hz screens dt≈8.3, on 60Hz dt≈16.7
  // This ensures physics behaves identically regardless of refresh rate
  const step = dt / 16.667;
  const t = tierFor(state.score);
  const slowFactor = state.fx.slowmo > 0 ? 0.5 : 1;
  const speed = t.speed * (tweaks.baseSpeed / 3) * slowFactor * step;
  state.scrollX += speed;

  // Tick FX timers
  if (state.fx.slowmo > 0) {
    state.fx.slowmo = Math.max(0, state.fx.slowmo - dt);
    updateFXHUD();
  }
  if (state.fx.iframes && state.fx.iframes > 0) {
    state.fx.iframes = Math.max(0, state.fx.iframes - dt);
  }

  // ball physics (frame-rate independent)
  const b = state.ball;
  b.vy += tweaks.gravity * step;
  if (b.vy > 14) b.vy = 14;
  b.y += b.vy * step;
  const targetRot = Math.max(-25, Math.min(75, b.vy * 6));
  b.rot += (targetRot - b.rot) * (1 - Math.pow(1 - 0.18, step));

  // spawn
  state.spawnTimer -= dt;
  if (state.spawnTimer <= 0) {
    spawnObstacle();
    state.spawnTimer = t.interval * (3 / Math.max(1.5, tweaks.baseSpeed));
  }

  // move obstacles
  for (let i = state.obstacles.length - 1; i >= 0; i--) {
    const ob = state.obstacles[i];
    ob.x -= speed;
    if (ob.moving) {
      ob.phase += 0.03 * step;
      const dy = Math.sin(ob.phase) * ob.amp;
      ob.gapY = ob.baseGapY + dy;
    }
    // score when passed
    if (!ob.scored && ob.x + 40 < b.x) {
      ob.scored = true;
      // 2x bonus ticks down per pipe
      const inc = state.fx.x2 > 0 ? 2 : 1;
      if (state.fx.x2 > 0) { state.fx.x2 -= 1; updateFXHUD(); }
      state.score += inc;
      scoreText.textContent = state.score;
      updateTierHUD(state.score);
      AudioManager.playSFX('score');
      // milestone?
      const m = MILESTONES.find(m => m.at === state.score);
      if (m && !state.shown[m.at]) {
        state.shown[m.at] = true;
        triggerBanner(m);
        AudioManager.playSFX('milestone');
      }
      updateSky(state.score);
    }

    // Pesky guy state machine
    if (ob.pesky) {
      const p = ob.pesky;
      // Update mount position to follow moving pipes
      if (ob.moving) {
        p.mountY = ob.gapY + ob.gap;
        p.wrap.setAttribute('transform', `translate(0 ${p.mountY})`);
      }
      if (p.state === 'waiting' && ob.x <= p.triggerX) {
        p.state = 'rising';
        p.t = 0;
      }
      if (p.state !== 'waiting' && p.state !== 'done') {
        p.t += dt;
        let offset = 40;
        const EMERGED = -36;
        if (p.state === 'rising') {
          const k = Math.min(1, p.t / 300);
          const e = 1 - Math.pow(1 - k, 3);
          offset = 40 + e * (EMERGED - 40);
          if (k >= 1) { p.state = 'waving'; p.t = 0; }
        } else if (p.state === 'waving') {
          offset = EMERGED;
          const arm = p.el.querySelector('.pesky-arm');
          if (arm) {
            const wave = Math.sin(p.t * 0.018) * 35;
            arm.setAttribute('transform', `rotate(${wave} -10 10)`);
          }
          if (p.t > 1100) { p.state = 'retreating'; p.t = 0; }
        } else if (p.state === 'retreating') {
          const k = Math.min(1, p.t / 260);
          const e = k * k;
          offset = EMERGED + e * (40 - EMERGED);
          if (k >= 1) { p.state = 'done'; }
        }
        p.el.setAttribute('transform', `translate(0 ${offset})`);
      }
    }
    // remove offscreen
    if (ob.x < -80) {
      ob.el.remove();
      state.obstacles.splice(i, 1);
    }
  }

  // Power-ups: move with scroll, bob, detect pickup
  for (let i = state.powerups.length - 1; i >= 0; i--) {
    const pu = state.powerups[i];
    if (pu.collected) { state.powerups.splice(i, 1); continue; }
    pu.x -= speed;
    pu.phase += 0.08 * step;
    pu.y = pu.baseY + Math.sin(pu.phase) * 10;
    pu.el.setAttribute('transform', `translate(${pu.x} ${pu.y})`);
    // JS-driven animation for halo/ring/rays (replaces SVG <animate>)
    if (pu.haloEl) {
      const p = pu.phase;
      const hr = 30 + Math.sin(p * 0.6) * 5;
      pu.haloEl.setAttribute('r', hr);
      pu.haloEl.setAttribute('opacity', 0.18 + Math.sin(p * 0.6) * 0.07);
    }
    if (pu.ringEl) pu.ringEl.setAttribute('r', 25 + Math.sin(pu.phase * 0.8) * 2.5);
    if (pu.raysEl) pu.raysEl.setAttribute('transform', `rotate(${(pu.phase * 15) % 360})`);
    // Collision with ball
    const dx = pu.x - b.x, dy = pu.y - b.y;
    if (dx * dx + dy * dy < (BALL_R + 22) * (BALL_R + 22)) {
      collectPowerup(pu);
    }
    // Offscreen cleanup
    if (pu.x < -60) {
      pu.el.remove();
      state.powerups.splice(i, 1);
    }
  }

  // parallax clouds (speed already has step baked in)
  for (const c of state.clouds) {
    c.x -= 0.3 * speed;
    if (c.x < -60) c.x += W + 120;
    c.el.setAttribute('transform', `translate(${c.x} ${c.y})`);
  }
  // hills
  for (const h of state.hills) {
    h.x -= 0.5 * speed;
    if (h.x + h.w < -40) h.x += state.hills.length * 180;
  }
  renderHills();
  // ground offset via pattern
  const gx = (-state.scrollX % 40 + 40) % 40;
  groundBand.setAttribute('x', -gx);
  const grx = (-state.scrollX % 24 + 24) % 24;
  grassBand.setAttribute('x', -grx);

  // collision
  if (checkCollision()) {
    gameOver();
  }

  // banner
  updateBanner(now);
}

function render() {
  const b = state.ball;
  ballGroup.setAttribute('transform', `translate(${b.x} ${b.y}) rotate(${b.rot})`);

  // Trail: reuse pooled circles instead of innerHTML thrashing
  const now = performance.now();
  const trailColor = BALL_PALETTES[tweaks.ballPalette]?.mid || '#ff6b5b';
  let poolIdx = 0;
  for (let i = 0; i < state.trail.length && poolIdx < TRAIL_POOL_SIZE; i++) {
    const p = state.trail[i];
    const age = (now - p.t) / 600;
    if (age < 1) {
      const c = trailPool[poolIdx++];
      c.setAttribute('cx', p.x - (state.trail.length - i) * 2);
      c.setAttribute('cy', p.y + (state.trail.length - i) * 2);
      c.setAttribute('r', BALL_R * (1 - age * 0.4));
      c.setAttribute('fill', trailColor);
      c.setAttribute('opacity', (1 - age) * 0.25);
    }
  }
  for (let i = poolIdx; i < TRAIL_POOL_SIZE; i++) {
    trailPool[i].setAttribute('opacity', '0');
  }

  // Update obstacle positions using cached refs
  for (const ob of state.obstacles) {
    if (ob.moving) {
      // Use cached rect references instead of querySelectorAll
      if (ob._topBody) ob._topBody.setAttribute('height', Math.max(0, ob.gapY - 20));
      if (ob._topLip) ob._topLip.setAttribute('y', ob.gapY - 22);
      if (ob._botLip) ob._botLip.setAttribute('y', ob.gapY + ob.gap);
      if (ob._botBody) {
        ob._botBody.setAttribute('y', ob.gapY + ob.gap + 22);
        ob._botBody.setAttribute('height', GROUND_Y - (ob.gapY + ob.gap + 22));
      }
      if (ob._topSpikes) ob._topSpikes.setAttribute('d', spikesPath(70, ob.gapY - 2, 'down'));
      if (ob._botSpikes) ob._botSpikes.setAttribute('d', spikesPath(70, ob.gapY + ob.gap + 2, 'up'));
      if (ob.sawEl) ob.sawEl.setAttribute('transform', `translate(0 ${ob.gapY + ob.gap/2})`);
    }
    ob.el.setAttribute('transform', `translate(${ob.x} 0)`);
  }

  // Debug hitbox overlay (only when enabled)
  if (tweaks.showHitboxes) drawHitboxes();
  else if (hitboxLayer.firstChild) hitboxLayer.innerHTML = '';
}

function drawHitboxes() {
  const layer = hitboxLayer;
  if (!layer) return;
  const pipeW = 70;
  const HIT_INSET = 5;
  const hx = pipeW - HIT_INSET * 2;
  let svg = '';
  // Ball
  svg += `<circle cx="${state.ball.x}" cy="${state.ball.y}" r="${BALL_R - 3}" fill="none" stroke="#ff00ff" stroke-width="1.5"/>`;
  for (const ob of state.obstacles) {
    const px = ob.x - pipeW/2 + HIT_INSET;
    // Top pipe hitbox
    svg += `<rect x="${px}" y="0" width="${hx}" height="${ob.gapY}" fill="rgba(255,0,0,0.25)" stroke="#ff3030" stroke-width="1"/>`;
    // Bottom pipe hitbox
    svg += `<rect x="${px}" y="${ob.gapY + ob.gap}" width="${hx}" height="${GROUND_Y - (ob.gapY + ob.gap)}" fill="rgba(255,0,0,0.25)" stroke="#ff3030" stroke-width="1"/>`;
    // Spikes
    if (ob.spikes) {
      const n = 7, step = (pipeW + 8) / n;
      const spikeR = 4;
      for (let s = 0; s < n; s++) {
        const mx = ob.x - pipeW/2 - 4 + step * (s + 0.5);
        svg += `<circle cx="${mx}" cy="${ob.gapY + 16}" r="${spikeR}" fill="rgba(255,255,0,0.5)" stroke="#ff0" stroke-width="1"/>`;
        svg += `<circle cx="${mx}" cy="${ob.gapY + ob.gap - 16}" r="${spikeR}" fill="rgba(255,255,0,0.5)" stroke="#ff0" stroke-width="1"/>`;
      }
    }
    // Saw
    if (ob.saw) {
      svg += `<circle cx="${ob.x}" cy="${ob.gapY + ob.gap/2}" r="${ob.sawR - 3}" fill="rgba(0,255,255,0.3)" stroke="#0ff" stroke-width="1.5"/>`;
    }
    // Pesky
    if (ob.pesky && (ob.pesky.state === 'rising' || ob.pesky.state === 'waving')) {
      const tr = ob.pesky.el.getAttribute('transform') || '';
      const m = tr.match(/translate\(0 (-?\d+(?:\.\d+)?)\)/);
      const off = m ? parseFloat(m[1]) : 40;
      const headY = ob.pesky.mountY + off - 4;
      if (headY + 11 < ob.pesky.mountY) {
        svg += `<circle cx="${ob.x}" cy="${headY}" r="11" fill="rgba(255,120,0,0.35)" stroke="#f60" stroke-width="1"/>`;
      }
      const bodyTop = ob.pesky.mountY + off + 8;
      const bodyBot = ob.pesky.mountY + off + 30;
      const visBot = Math.min(bodyBot, ob.pesky.mountY);
      if (visBot > bodyTop + 2) {
        svg += `<rect x="${ob.x - 12}" y="${bodyTop}" width="24" height="${visBot - bodyTop}" fill="rgba(255,120,0,0.35)" stroke="#f60" stroke-width="1"/>`;
      }
    }
  }
  layer.innerHTML = svg;
}

function spikesPath(pipeW, y, dir) {
  const n = 7, step = (pipeW + 8) / n;
  let path = '';
  for (let i = 0; i < n; i++) {
    const x1 = -pipeW/2 - 4 + i * step;
    const x2 = x1 + step;
    const mx = (x1 + x2) / 2;
    if (dir === 'down') {
      path += `M ${x1} ${y} L ${mx} ${y + 26} L ${x2} ${y} Z `;
    } else {
      path += `M ${x1} ${y} L ${mx} ${y - 26} L ${x2} ${y} Z `;
    }
  }
  return path;
}

function loop(now) {
  const dt = Math.min(50, now - state.lastT);
  state.lastT = now;
  state.time = now;
  update(dt, now);
  render();
  requestAnimationFrame(loop);
}

function onKey(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    flap();
  } else if (e.code === 'KeyP') {
    if (state.mode === 'play' || state.mode === 'pause') togglePause();
  } else if (e.code === 'Escape') {
    if (state.mode === 'pause') togglePause();
  }
}

});

let lbActiveTab = 'global';

function showLeaderboard() {
  menuG.setAttribute('opacity', '0');
  menuG.style.pointerEvents = 'none';
  leaderboardG.setAttribute('opacity', '1');
  leaderboardG.style.pointerEvents = 'auto';
  lbActiveTab = 'global';
  updateLBTabs();
  loadLeaderboardData();
}

function updateLBTabs() {
  const globalRect = document.querySelector('#lbTabGlobal rect');
  const globalText = document.querySelector('#lbTabGlobal text');
  const mineRect = document.querySelector('#lbTabMine rect');
  const mineText = document.querySelector('#lbTabMine text');
  if (lbActiveTab === 'global') {
    globalRect.setAttribute('fill', '#ff6b5b');
    globalText.setAttribute('fill', '#fff');
    mineRect.setAttribute('fill', '#cdd1dc');
    mineText.setAttribute('fill', '#2a1a10');
  } else {
    globalRect.setAttribute('fill', '#cdd1dc');
    globalText.setAttribute('fill', '#2a1a10');
    mineRect.setAttribute('fill', '#ff6b5b');
    mineText.setAttribute('fill', '#fff');
  }
}

async function loadLeaderboardData() {
  const rows = document.getElementById('lbRows');
  const status = document.getElementById('lbStatus');
  rows.innerHTML = '';
  status.setAttribute('opacity', '1');
  status.textContent = 'Loading...';

  try {
    let data;
    if (lbActiveTab === 'global') {
      data = await LeaderboardAPI.getTopScores(10);
    } else {
      const name = LeaderboardAPI.getStoredName();
      if (!name) {
        status.textContent = 'Play a game and submit your score first!';
        return;
      }
      data = await LeaderboardAPI.getPlayerScores(name, 10);
    }

    status.setAttribute('opacity', '0');
    if (data.length === 0) {
      status.setAttribute('opacity', '1');
      status.textContent = 'No scores yet!';
      return;
    }

    data.forEach((entry, i) => {
      const y = i * 48;
      const rank = entry.rank || (i + 1);
      const name = entry.name || LeaderboardAPI.getStoredName();
      const date = new Date(entry.created_at);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const bg = i % 2 === 0 ? '#f5f0e0' : '#fffbef';
      rows.innerHTML += `
        <g transform="translate(0 ${y})">
          <rect x="80" y="0" width="380" height="44" rx="8" fill="${bg}"/>
          <text x="100" y="28" font-family="Rubik" font-weight="900" font-size="16" fill="#6e7486">#${rank}</text>
          ${lbActiveTab === 'global' ? `<text x="150" y="28" font-family="Rubik" font-weight="700" font-size="15" fill="#2a1a10">${name.length > 12 ? name.slice(0, 12) + '...' : name}</text>` : ''}
          <text x="380" y="28" text-anchor="end" font-family="Rubik" font-weight="900" font-size="18" fill="#ff6b5b">${entry.score}</text>
          <text x="440" y="28" text-anchor="end" font-family="Rubik" font-weight="500" font-size="11" fill="#9aa0ae">${dateStr}</text>
        </g>
      `;
    });
  } catch (err) {
    status.textContent = 'Could not load scores';
  }
}

async function submitScore() {
  const input = document.getElementById('scoreNameInput');
  const submitText = document.getElementById('goSubmitText');
  const submitRect = document.querySelector('#goSubmitBtn rect');
  if (!input || !submitText) return;

  const name = input.value.trim();
  if (!name || name.length > 20) {
    input.style.borderColor = '#ff4a4a';
    setTimeout(() => input.style.borderColor = '#cdd1dc', 800);
    return;
  }

  submitText.textContent = 'SUBMITTING...';
  input.disabled = true;

  const result = await LeaderboardAPI.submitScore(name, state.score);

  if (result.offline) {
    submitText.textContent = 'SAVED LOCALLY';
  } else {
    submitText.textContent = result.rank ? `RANK #${result.rank}` : 'SUBMITTED';
  }
  submitRect.setAttribute('fill', '#6e7486');
  AudioManager.playSFX('submit');
}

function showSettings() {

function syncSettingsUI() {
  const s = AudioManager.getSettings();
  const bgmFill = document.getElementById('bgmFill');
  const bgmKnob = document.getElementById('bgmKnob');
  const sfxFill = document.getElementById('sfxFill');
  const sfxKnob = document.getElementById('sfxKnob');
  const bgmMuteText = document.getElementById('bgmMuteText');
  const sfxMuteText = document.getElementById('sfxMuteText');
  const bgmMuteRect = document.querySelector('#bgmMuteBtn rect');
  const sfxMuteRect = document.querySelector('#sfxMuteBtn rect');

  const sliderW = 310;
  const sliderX = 120;

  if (bgmFill) bgmFill.setAttribute('width', s.bgmVolume * sliderW);
  if (bgmKnob) bgmKnob.setAttribute('cx', sliderX + s.bgmVolume * sliderW);
  if (sfxFill) sfxFill.setAttribute('width', s.sfxVolume * sliderW);
  if (sfxKnob) sfxKnob.setAttribute('cx', sliderX + s.sfxVolume * sliderW);

  if (bgmMuteText) bgmMuteText.textContent = s.bgmMuted ? 'OFF' : 'ON';
  if (bgmMuteRect) bgmMuteRect.setAttribute('fill', s.bgmMuted ? '#6e7486' : '#44c4a9');
  if (sfxMuteText) sfxMuteText.textContent = s.sfxMuted ? 'OFF' : 'ON';
  if (sfxMuteRect) sfxMuteRect.setAttribute('fill', s.sfxMuted ? '#6e7486' : '#4aa8e8');
}

function setupSliderDrag(knobId, fillId, y, onChange) {
  const knob = document.getElementById(knobId);
  const fill = document.getElementById(fillId);
  if (!knob) return;

  const sliderX = 120, sliderW = 310;
  let dragging = false;

  function getVal(clientX) {
    const svgRect = world.getBoundingClientRect();
    const svgX = (clientX - svgRect.left) / svgRect.width * 540;
    return Math.max(0, Math.min(1, (svgX - sliderX) / sliderW));
  }

  function updateSlider(clientX) {
    const v = getVal(clientX);
    knob.setAttribute('cx', sliderX + v * sliderW);
    if (fill) fill.setAttribute('width', v * sliderW);
    onChange(v);
  }

  knob.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    dragging = true;
    knob.setPointerCapture(e.pointerId);
  });

  knob.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    e.stopPropagation();
    updateSlider(e.clientX);
  });

  knob.addEventListener('pointerup', (e) => {
    dragging = false;
  });
}

setupSliderDrag('bgmKnob', 'bgmFill', 404, (v) => AudioManager.setBGMVolume(v));

// ===== Tweak bindings =====
function bindTweaks() {
  const g = document.getElementById('tw-gravity');
  const gv = document.getElementById('tw-gravity-v');
  const f = document.getElementById('tw-flap');
  const fv = document.getElementById('tw-flap-v');
  const s = document.getElementById('tw-speed');
  const sv = document.getElementById('tw-speed-v');
  const gp = document.getElementById('tw-gap');
  const gpv = document.getElementById('tw-gap-v');
  const tt = document.getElementById('tw-tier');
  const ttv = document.getElementById('tw-tier-v');
  g.value = tweaks.gravity; gv.textContent = tweaks.gravity;
  f.value = tweaks.flap; fv.textContent = tweaks.flap;
  s.value = tweaks.baseSpeed; sv.textContent = tweaks.baseSpeed;
  gp.value = tweaks.gapSize; gpv.textContent = tweaks.gapSize;
  tt.value = tweaks.startTier || 1; ttv.textContent = tt.value;
  g.addEventListener('input', () => { const v = +g.value; gv.textContent = v; persistTweak('gravity', v); });
  f.addEventListener('input', () => { const v = +f.value; fv.textContent = v; persistTweak('flap', v); });
  s.addEventListener('input', () => { const v = +s.value; sv.textContent = v; persistTweak('baseSpeed', v); });
  gp.addEventListener('input', () => { const v = +gp.value; gpv.textContent = v; persistTweak('gapSize', v); });
  tt.addEventListener('input', () => { const v = +tt.value; ttv.textContent = v; persistTweak('startTier', v); });

  // Hitbox debug overlay
  const hb = document.getElementById('tw-hitbox');
  const hbv = document.getElementById('tw-hitbox-v');
  if (hb) {
    hb.checked = !!tweaks.showHitboxes;
    hbv.textContent = hb.checked ? 'on' : 'off';
    hb.addEventListener('change', () => {
      const v = hb.checked;
      hbv.textContent = v ? 'on' : 'off';
      persistTweak('showHitboxes', v);
      if (hitboxLayer) hitboxLayer.setAttribute('opacity', v ? '1' : '0');
    });
    if (hitboxLayer) hitboxLayer.setAttribute('opacity', tweaks.showHitboxes ? '1' : '0');
  }

  const pal = document.getElementById('tw-ball-pal');
  Object.entries(BALL_PALETTES).forEach(([name, p]) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (name === tweaks.ballPalette ? ' active' : '');
    sw.style.background = p.mid;
    sw.title = name;
    sw.addEventListener('click', () => {
      persistTweak('ballPalette', name);
      applyBallPalette();
      [...pal.children].forEach(c => c.classList.remove('active'));
      sw.classList.add('active');
    });
    pal.appendChild(sw);
  });
}

// ===== Boot =====
function boot() {
  applyBallPalette();
  initTrailPool();
  initClouds();
  initHills();
  updateSky(0);
  bindTweaks();
  bestText.textContent = state.best;
  if (IS_MOBILE) {
    const controls = document.getElementById('controls');
    if (controls) controls.style.display = 'none';
  }
  showMenu();
  state.lastT = performance.now();
  requestAnimationFrame(loop);
  stage.focus();
}
boot();
