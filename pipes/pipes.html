  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink removed in deployed build.

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    function bytesToDataUrl(bytes, mime) {
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return 'data:' + mime + ';base64,' + btoa(binary);
    }

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = bytesToDataUrl(finalBytes, entry.mime);
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = 'data:' + entry.mime + ';base64,';
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

r-radius: 0;\n    }\n    #tweaks { display: none; }\n    #controls { font-size: 8px !important; }\n  }\n\n  #tweak-toggle {\n    display: none;\n  }\n  #tweak-backdrop {\n    display: none;\n  }\n  body.has-tweak #tweak-toggle {\n    display: flex;\n    position: fixed; bottom: 16px; right: 16px; z-index: 200;\n    width: 48px; height: 48px;\n    border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);\n    background: rgba(20,22,30,0.9); color: #fff;\n    font-size: 24px; align-items: center; justify-content: center;\n    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4);\n  }\n  #tweak-backdrop.show {\n    display: block;\n    position: fixed; inset: 0; z-index: 150;\n    background: rgba(0,0,0,0.5);\n  }\n  #tweaks.show {\n    display: block !important;\n    position: fixed !important;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    z-index: 250;\n    max-height: 80vh;\n    width: min(340px, 90vw);\n  }\n</style>\n<style>\n  :root {\n    --bg: #1a1d26;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body {\n    width: 100%;\n    height: 100%;\n    background: var(--bg);\n    font-family: 'Rubik', system-ui, sans-serif;\n    overflow: hidden;\n    overscroll-behavior: none;\n    user-select: none;\n    -webkit-user-select: none;\n    touch-action: manipulation;\n  }\n  body {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 28px;\n    padding: 24px;\n  }\n  /* Stage: fixed 9:16 playfield, scales to fit */\n  #stage {\n    position: relative;\n    /* Leave room for the sidebar (≈320px + gap) on landscape screens */\n    width: min(calc(100vw - 380px), calc((100vh - 48px) * 9 / 16));\n    height: min(calc(100vh - 48px), calc((100vw - 380px) * 16 / 9));\n    max-width: 540px;\n    max-height: 960px;\n    background: #9fd4ea;\n    overflow: hidden;\n    box-shadow: 0 20px 60px rgba(0,0,0,0.45);\n    cursor: pointer;\n  }\n  #stage.shake { animation: shake 0.35s cubic-bezier(.36,.07,.19,.97) both; }\n  @keyframes shake {\n    0%, 100% { transform: translate(0,0); }\n    10% { transform: translate(-6px, -2px); }\n    20% { transform: translate(6px, 2px); }\n    30% { transform: translate(-5px, 3px); }\n    40% { transform: translate(5px, -3px); }\n    50% { transform: translate(-3px, 2px); }\n    60% { transform: translate(3px, -2px); }\n    70% { transform: translate(-2px, 1px); }\n    80% { transform: translate(2px, -1px); }\n    90% { transform: translate(-1px, 0); }\n  }\n  svg { display: block; width: 100%; height: 100%; }\n  .overlay {\n    position: absolute; inset: 0;\n    pointer-events: none;\n  }\n  #startHint, #gameOverUI, #pauseUI {\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    pointer-events: none;\n  }\n  #pauseUI, #gameOverUI { display: none; }\n  .banner {\n    position: absolute;\n    top: 28%;\n    left: 50%;\n    transform: translate(-50%, -50%) scale(0.6);\n    opacity: 0;\n    pointer-events: none;\n  }\n  .banner.show {\n    animation: pop 1.4s ease-out forwards;\n  }\n  @keyframes pop {\n    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-6deg); }\n    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }\n    40% { transform: translate(-50%, -50%) scale(0.95) rotate(-2deg); }\n    60% { transform: translate(-50%, -50%) scale(1.02) rotate(1deg); }\n    80% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }\n    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }\n  }\n  @keyframes rotateSpin {\n    from { transform: rotate(0deg); }\n    to { transform: rotate(360deg); }\n  }\n  .saw-blade { animation: rotateSpin 0.4s linear infinite; transform-origin: center; transform-box: fill-box; }\n  .saw-blade.reverse { animation-direction: reverse; }\n  .cloud { opacity: 0.92; }\n\n  /* Tweaks panel — always visible sidebar in the standalone landscape layout */\n  #tweaks {\n    position: relative;\n    width: 300px;\n    flex: 0 0 300px;\n    max-height: calc(100vh - 48px);\n    overflow: auto;\n    background: rgba(20, 22, 30, 0.94);\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: 14px;\n    padding: 16px 16px 14px;\n    color: #eceef3;\n    font-family: 'Rubik', system-ui, sans-serif;\n    font-size: 12px;\n    box-shadow: 0 18px 40px rgba(0,0,0,0.45);\n    z-index: 100;\n    display: block;\n  }\n  /* On narrow (portrait) viewports, hide the sidebar so the game stays playable */\n  @media (max-aspect-ratio: 3/4) {\n    body { flex-direction: column; padding: 12px; gap: 12px; }\n    #stage {\n      width: min(100vw, calc((100vh - 24px) * 9 / 16));\n      height: min(calc(100vh - 24px), calc(100vw * 16 / 9));\n    }\n    #tweaks { display: none; }\n  }\n  #tweaks h3 {\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: #9aa0ae;\n    margin-bottom: 10px;\n  }\n  .tweak-row {\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 10px; margin-bottom: 8px;\n  }\n  .tweak-row label { flex: 1; color: #cdd1dc; font-weight: 500; }\n  .tweak-row input[type=\"range\"] {\n    flex: 1.2; accent-color: #ff6b5b;\n  }\n  .tweak-row .val {\n    font-variant-numeric: tabular-nums;\n    color: #ff9a8a;\n    font-weight: 700;\n    min-width: 36px;\n    text-align: right;\n    font-size: 11px;\n  }\n  .palette-row { display: flex; gap: 6px; margin-top: 2px; }\n  .swatch {\n    width: 28px; height: 28px; border-radius: 8px;\n    border: 2px solid transparent;\n    cursor: pointer;\n    transition: transform 0.12s ease;\n  }\n  .swatch:hover { transform: scale(1.08); }\n  .swatch.active { border-color: #ffffff; }\n  .hint {\n    color: #6e7486; font-size: 10px; margin-top: 8px;\n    text-align: center; letter-spacing: 0.04em;\n  }\n</style>\n</head>\n<body>\n\n<div id=\"stage\" tabindex=\"0\" aria-label=\"Pipes game. Press space or tap to flap.\">\n  <!-- Main SVG -->\n  <svg id=\"world\" viewBox=\"0 0 540 960\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n    <defs>\n      <!-- Sky gradient (mutable via JS) -->\n      <linearGradient id=\"skyGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop id=\"skyTop\" offset=\"0\" stop-color=\"#ffd3a8\"></stop>\n        <stop id=\"skyMid\" offset=\"0.55\" stop-color=\"#9fd4ea\"></stop>\n        <stop id=\"skyBot\" offset=\"1\" stop-color=\"#c6e9f2\"></stop>\n      </linearGradient>\n      <!-- Ball gradient -->\n      <radialGradient id=\"ballGrad\" cx=\"0.35\" cy=\"0.32\" r=\"0.8\">\n        <stop offset=\"0\" stop-color=\"#ffb6a9\"></stop>\n        <stop offset=\"0.55\" stop-color=\"#ff6b5b\"></stop>\n        <stop offset=\"1\" stop-color=\"#c13a2e\"></stop>\n      </radialGradient>\n      <!-- Logo clip (ball is logo) -->\n      <clipPath id=\"ballClip\"><circle r=\"26\"></circle></clipPath>\n      <!-- Pipe gradient -->\n      <linearGradient id=\"pipeGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#2fa38b\"></stop>\n        <stop offset=\"0.5\" stop-color=\"#44c4a9\"></stop>\n        <stop offset=\"1\" stop-color=\"#1f7a68\"></stop>\n      </linearGradient>\n      <linearGradient id=\"pipeGrad2\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#d97845\"></stop>\n        <stop offset=\"0.5\" stop-color=\"#f2a06b\"></stop>\n        <stop offset=\"1\" stop-color=\"#a8522b\"></stop>\n      </linearGradient>\n      <linearGradient id=\"pipeGrad3\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#6a4fb8\"></stop>\n        <stop offset=\"0.5\" stop-color=\"#9779d6\"></stop>\n        <stop offset=\"1\" stop-color=\"#4a358a\"></stop>\n      </linearGradient>\n      <!-- Ground -->\n      <pattern id=\"groundPat\" x=\"0\" y=\"0\" width=\"40\" height=\"24\" patternUnits=\"userSpaceOnUse\">\n        <rect width=\"40\" height=\"24\" fill=\"#e8c98a\"></rect>\n        <path d=\"M0 20 L8 14 L16 20 L24 14 L32 20 L40 14\" stroke=\"#c9a35a\" stroke-width=\"2\" fill=\"none\"></path>\n      </pattern>\n      <pattern id=\"grassPat\" x=\"0\" y=\"0\" width=\"24\" height=\"14\" patternUnits=\"userSpaceOnUse\">\n        <rect width=\"24\" height=\"14\" fill=\"#7ac074\"></rect>\n        <path d=\"M4 14 L6 6 L8 14 M12 14 L14 4 L16 14 M20 14 L22 7 L24 14\" stroke=\"#5ea758\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"></path>\n      </pattern>\n      <!-- Shadow filter for ball -->\n      <filter id=\"ballShadow\" x=\"-40%\" y=\"-40%\" width=\"180%\" height=\"180%\">\n        <feGaussianBlur in=\"SourceAlpha\" stdDeviation=\"2.5\"></feGaussianBlur>\n        <feOffset dx=\"0\" dy=\"3\" result=\"off\"></feOffset>\n        <feComponentTransfer><feFuncA type=\"linear\" slope=\"0.35\"></feFuncA></feComponentTransfer>\n        <feMerge><feMergeNode></feMergeNode><feMergeNode in=\"SourceGraphic\"></feMergeNode></feMerge>\n      </filter>\n      <!-- Score text outline -->\n      <filter id=\"scoreShadow\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n        <feDropShadow dx=\"0\" dy=\"4\" stdDeviation=\"2\" flood-color=\"#000\" flood-opacity=\"0.35\"></feDropShadow>\n      </filter>\n    </defs>\n\n    <!-- Sky -->\n    <rect id=\"skyRect\" width=\"540\" height=\"960\" fill=\"url(#skyGrad)\"></rect>\n\n    <!-- Back layer: clouds -->\n    <g id=\"cloudLayer\"></g>\n\n    <!-- Mid layer: distant hills -->\n    <g id=\"hillLayer\"></g>\n\n    <!-- Obstacles -->\n    <g id=\"obstacleLayer\"></g>\n\n    <!-- Power-ups -->\n    <g id=\"powerupLayer\"></g>\n\n    <!-- Debug hitbox overlay (toggled via Tweaks) -->\n    <g id=\"hitboxLayer\" style=\"pointer-events:none;\" opacity=\"0\"></g>\n\n    <!-- Front layer: grass + ground -->\n    <g id=\"frontLayer\">\n      <rect id=\"grassBand\" x=\"0\" y=\"880\" width=\"540\" height=\"14\" fill=\"url(#grassPat)\"></rect>\n      <rect id=\"groundBand\" x=\"0\" y=\"894\" width=\"540\" height=\"66\" fill=\"url(#groundPat)\"></rect>\n    </g>\n\n    <!-- Player ball trail -->\n    <g id=\"trailLayer\"></g>\n\n    <!-- Player ball (logo badge) -->\n    <g id=\"ballGroup\" transform=\"translate(160 480)\">\n      <g id=\"ballInner\" filter=\"url(#ballShadow)\">\n        <!-- Dark badge background so logo reads against sky -->\n        <circle r=\"26\" fill=\"#1e2129\" stroke=\"#0c0e14\" stroke-width=\"2.5\"></circle>\n        <!-- Logo image, clipped to circle -->\n        <image id=\"ballImage\" href=\"93eeb2e8-5751-4b9f-be5d-39f7b650f7d5\" x=\"-24\" y=\"-24\" width=\"48\" height=\"48\" preserveAspectRatio=\"xMidYMid meet\" clip-path=\"url(#ballClip)\"></image>\n        <!-- subtle glossy highlight -->\n        <ellipse cx=\"-9\" cy=\"-12\" rx=\"8\" ry=\"4\" fill=\"#ffffff\" opacity=\"0.16\"></ellipse>\n      </g>\n    </g>\n\n    <!-- UI Layer -->\n    <g id=\"uiLayer\">\n      <!-- Score -->\n      <g id=\"scoreGroup\" transform=\"translate(270 80)\">\n        <text id=\"scoreText\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"72\" fill=\"#fff\" stroke=\"#2a1a10\" stroke-width=\"6\" paint-order=\"stroke fill\" filter=\"url(#scoreShadow)\">0</text>\n      </g>\n      <!-- Best score pill -->\n      <g id=\"bestGroup\" transform=\"translate(540 40)\">\n        <rect x=\"-130\" y=\"0\" width=\"120\" height=\"36\" rx=\"18\" fill=\"#20201f\" opacity=\"0.78\"></rect>\n        <text x=\"-115\" y=\"24\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"12\" fill=\"#ffd66b\" letter-spacing=\"1.2\">BEST</text>\n        <text id=\"bestText\" x=\"-20\" y=\"24\" text-anchor=\"end\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"16\" fill=\"#ffffff\">0</text>\n      </g>\n      <!-- Tier pill -->\n      <g id=\"tierGroup\" transform=\"translate(10 40)\">\n        <rect id=\"tierPill\" x=\"0\" y=\"0\" width=\"146\" height=\"36\" rx=\"18\" fill=\"#20201f\" opacity=\"0.82\"></rect>\n        <text x=\"14\" y=\"24\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"12\" fill=\"#8fdcc1\" letter-spacing=\"1.6\">TIER</text>\n        <text id=\"tierNum\" x=\"52\" y=\"24\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"16\" fill=\"#ffffff\">1</text>\n        <text id=\"tierFeatures\" x=\"70\" y=\"23\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"10\" fill=\"#ffd66b\" letter-spacing=\"1.3\">PLAIN</text>\n      </g>\n      <!-- Active FX badges (row under tier pill) -->\n      <g id=\"fxGroup\" transform=\"translate(10 84)\"></g>\n    </g>\n\n    <!-- Mute button -->\n    <g id=\"muteBtnG\" transform=\"translate(490 10)\" cursor=\"pointer\" onclick=\"toggleMute()\">\n      <rect x=\"0\" y=\"0\" width=\"40\" height=\"40\" rx=\"10\" fill=\"#20201f\" opacity=\"0.55\"/>\n      <text id=\"muteBtn\" x=\"20\" y=\"28\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"13\" fill=\"#fff\">SFX</text>\n    </g>\n    <!-- Start hint -->\n    <g id=\"startHintG\" opacity=\"1\">\n      <rect x=\"90\" y=\"370\" width=\"360\" height=\"220\" rx=\"22\" fill=\"#20201f\" opacity=\"0.78\"></rect>\n      <text x=\"270\" y=\"460\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"48\" fill=\"#fff\" letter-spacing=\"4\">PIPES</text>\n      <text x=\"270\" y=\"498\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"500\" font-size=\"14\" fill=\"#cdd1dc\" letter-spacing=\"2\">TAP OR PRESS SPACE TO FLAP</text>\n      <g transform=\"translate(270 548)\">\n        <rect x=\"-80\" y=\"-16\" width=\"160\" height=\"36\" rx=\"18\" fill=\"#ff6b5b\"></rect>\n        <text y=\"8\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"15\" fill=\"#fff\" letter-spacing=\"1.5\">START</text>\n      </g>\n    </g>\n\n    <!-- Pause overlay -->\n    <g id=\"pauseG\" opacity=\"0\" style=\"pointer-events:none\">\n      <rect width=\"540\" height=\"960\" fill=\"#000\" opacity=\"0.45\"></rect>\n      <text x=\"270\" y=\"470\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"48\" fill=\"#fff\">PAUSED</text>\n      <text x=\"270\" y=\"510\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"500\" font-size=\"14\" fill=\"#cdd1dc\" letter-spacing=\"2\">PRESS P TO RESUME</text>\n    </g>\n\n    <!-- Game over overlay -->\n    <g id=\"gameOverG\" opacity=\"0\" style=\"pointer-events:none\">\n      <rect width=\"540\" height=\"960\" fill=\"#000\" opacity=\"0.55\"></rect>\n      <rect x=\"70\" y=\"300\" width=\"400\" height=\"360\" rx=\"24\" fill=\"#fffbef\" stroke=\"#2a1a10\" stroke-width=\"4\"></rect>\n      <text x=\"270\" y=\"370\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"42\" fill=\"#2a1a10\" letter-spacing=\"1\">GAME OVER</text>\n      <line x1=\"120\" y1=\"390\" x2=\"420\" y2=\"390\" stroke=\"#2a1a10\" stroke-opacity=\"0.15\" stroke-width=\"2\"></line>\n\n      <!-- Medal slot -->\n      <g id=\"medalSlot\" transform=\"translate(160 480)\"></g>\n\n      <g transform=\"translate(260 440)\">\n        <text font-family=\"Rubik\" font-weight=\"500\" font-size=\"14\" fill=\"#6e7486\" letter-spacing=\"2\">SCORE</text>\n        <text id=\"finalScore\" y=\"38\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"38\" fill=\"#2a1a10\">0</text>\n        <text y=\"72\" font-family=\"Rubik\" font-weight=\"500\" font-size=\"14\" fill=\"#6e7486\" letter-spacing=\"2\">BEST</text>\n        <text id=\"finalBest\" y=\"100\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"24\" fill=\"#ff6b5b\">0</text>\n      </g>\n\n      <g transform=\"translate(270 620)\">\n        <rect x=\"-110\" y=\"-22\" width=\"220\" height=\"44\" rx=\"22\" fill=\"#ff6b5b\"></rect>\n        <text y=\"8\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"15\" fill=\"#fff\" letter-spacing=\"1.8\">TAP OR PRESS R</text>\n      </g>\n    </g>\n\n    <!-- Milestone banner -->\n    <g id=\"bannerG\" opacity=\"0\"></g>\n  </svg>\n\n  <div id=\"controls\" style=\"position:absolute; top:12px; left:12px; display:flex; gap:6px; pointer-events:none;\">\n    <div style=\"background:rgba(0,0,0,0.35); color:#fff; padding:4px 9px; border-radius:10px; font-size:10px; letter-spacing:1.5px; font-weight:600;\">SPACE · FLAP</div>\n    <div style=\"background:rgba(0,0,0,0.35); color:#fff; padding:4px 9px; border-radius:10px; font-size:10px; letter-spacing:1.5px; font-weight:600;\">P · PAUSE</div>\n    <div style=\"background:rgba(0,0,0,0.35); color:#fff; padding:4px 9px; border-radius:10px; font-size:10px; letter-spacing:1.5px; font-weight:600;\">R · RESET</div>\n  </div>\n</div>\n\n<!-- Tweaks panel -->\n<div id=\"tweaks\">\n  <h3>Tweaks</h3>\n  <div class=\"tweak-row\">\n    <label>Gravity</label>\n    <input id=\"tw-gravity\" type=\"range\" min=\"0.2\" max=\"1.2\" step=\"0.05\" value=\"0.55\">\n    <span class=\"val\" id=\"tw-gravity-v\">0.55</span>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Flap power</label>\n    <input id=\"tw-flap\" type=\"range\" min=\"4\" max=\"14\" step=\"0.5\" value=\"9\">\n    <span class=\"val\" id=\"tw-flap-v\">9</span>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Base speed</label>\n    <input id=\"tw-speed\" type=\"range\" min=\"1.5\" max=\"5\" step=\"0.25\" value=\"3\">\n    <span class=\"val\" id=\"tw-speed-v\">3</span>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Gap size</label>\n    <input id=\"tw-gap\" type=\"range\" min=\"110\" max=\"220\" step=\"5\" value=\"170\">\n    <span class=\"val\" id=\"tw-gap-v\">170</span>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Start at tier</label>\n    <input id=\"tw-tier\" type=\"range\" min=\"1\" max=\"5\" step=\"1\" value=\"1\">\n    <span class=\"val\" id=\"tw-tier-v\">1</span>\n  </div>\n  <div class=\"tweak-row\" style=\"margin-top:6px;\">\n    <label>Ball color</label>\n    <div class=\"palette-row\" id=\"tw-ball-pal\"></div>\n  </div>\n  <div class=\"tweak-row\" style=\"margin-top:6px;\">\n    <label>Show hitboxes</label>\n    <input id=\"tw-hitbox\" type=\"checkbox\">\n    <span class=\"val\" id=\"tw-hitbox-v\">off</span>\n  </div>\n  <div class=\"hint\">Live preview — settings stick.</div>\n</div>\n\n<script>\n// ===== Tweakable defaults (persisted via EDITMODE block) =====\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"gravity\": 0.35,\n  \"flap\": 7.5,\n  \"baseSpeed\": 2.25,\n  \"gapSize\": 220,\n  \"ballPalette\": \"coral\",\n  \"startTier\": 1,\n  \"showHitboxes\": false\n}/*EDITMODE-END*/;\n\nconst BALL_PALETTES = {\n  coral:   { light: '#ffb6a9', mid: '#ff6b5b', dark: '#c13a2e', stroke: '#7a1e15' },\n  citron:  { light: '#fff3a3', mid: '#ffd447', dark: '#b38800', stroke: '#6b5200' },\n  ocean:   { light: '#a3e0ff', mid: '#4aa8e8', dark: '#1f5f99', stroke: '#133a5c' },\n  violet:  { light: '#e0b6ff', mid: '#a06bdc', dark: '#5a3a8a', stroke: '#32205a' },\n  mint:    { light: '#b6f0d4', mid: '#4dcf8d', dark: '#1f7a4d', stroke: '#0f3e27' }\n};\n\n// ===== Edit mode protocol =====\nlet editActive = false;\nconst tweaks = { ...TWEAK_DEFAULTS };\n(function() {\n  var params = new URLSearchParams(window.location.search);\n  if (params.has('gravity')) tweaks.gravity = parseFloat(params.get('gravity'));\n  if (params.has('flap')) tweaks.flap = parseFloat(params.get('flap'));\n  if (params.has('speed')) tweaks.baseSpeed = parseFloat(params.get('speed'));\n  if (params.has('gap')) tweaks.gapSize = parseInt(params.get('gap'));\n  if (params.has('tier')) tweaks.startTier = parseInt(params.get('tier'));\n  if (params.has('hitboxes')) tweaks.showHitboxes = params.get('hitboxes') === '1';\n  if (params.has('hasTWEAK')) {\n    document.addEventListener('DOMContentLoaded', function() {\n      var btn = document.createElement('button');\n      btn.id = 'tweak-toggle';\n      btn.textContent = '⚙';\n      btn.title = 'Tweaks';\n      document.body.appendChild(btn);\n      document.body.classList.add('has-tweak');\n      var panel = document.getElementById('tweaks');\n      var backdrop = document.createElement('div');\n      backdrop.id = 'tweak-backdrop';\n      document.body.appendChild(backdrop);\n      btn.addEventListener('click', function() {\n        var open = panel.classList.toggle('show');\n        backdrop.classList.toggle('show', open);\n      });\n      backdrop.addEventListener('click', function() {\n        panel.classList.remove('show');\n        backdrop.classList.remove('show');\n      });\n    });\n  }\n})();\n\nwindow.addEventListener('message', (e) => {\n  const d = e.data;\n  if (!d || typeof d !== 'object') return;\n  if (d.type === '__activate_edit_mode') {\n    editActive = true;\n    document.getElementById('tweaks').classList.add('active');\n  } else if (d.type === '__deactivate_edit_mode') {\n    editActive = false;\n    document.getElementById('tweaks').classList.remove('active');\n  }\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n\nfunction persistTweak(key, value) {\n  tweaks[key] = value;\n  try {\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');\n  } catch (e) {}\n}\n\n// ===== Game constants =====\nconst W = 540, H = 960;\nconst GROUND_Y = 880;\nconst BALL_X = 160;\nconst BALL_R = 22;\n\n// ===== State =====\nconst state = {\n  mode: 'start',        // 'start' | 'play' | 'pause' | 'over'\n  ball: { x: BALL_X, y: 480, vy: 0, rot: 0 },\n  obstacles: [],\n  powerups: [],         // floating collectibles\n  fx: { shield: 0, slowmo: 0, x2: 0 },  // remaining ms / pipes\n  score: 0,\n  best: 0,\n  scrollX: 0,\n  spawnTimer: 0,\n  shown: {},            // milestones shown\n  trail: [],\n  clouds: [],\n  hills: [],\n  lastT: 0,\n  time: 0\n};\n\n// ===== Tier config =====\nfunction tierFor(score) {\n  if (score < 5)  return { id: 1, speed: 3,   interval: 1600, gap: 170, color: 'url(#pipeGrad)',  moving: false, spikes: false, saw: false };\n  if (score < 10) return { id: 2, speed: 4,   interval: 1400, gap: 145, color: 'url(#pipeGrad2)', moving: false, spikes: false, saw: false };\n  if (score < 15) return { id: 3, speed: 5,   interval: 1250, gap: 135, color: 'url(#pipeGrad)',  moving: true,  spikes: false, saw: false };\n  if (score < 20) return { id: 4, speed: 6,   interval: 1100, gap: 125, color: 'url(#pipeGrad2)', moving: true,  spikes: true,  saw: false };\n  return             { id: 5, speed: 7,   interval: 950,  gap: 120, color: 'url(#pipeGrad3)', moving: true,  spikes: true,  saw: true  };\n}\n\n// Update the tier HUD pill — shows current tier + its hazards.\nlet _lastTierShown = -1;\nfunction updateTierHUD(score) {\n  const t = tierFor(score);\n  if (t.id === _lastTierShown) return;\n  _lastTierShown = t.id;\n  const numEl = document.getElementById('tierNum');\n  const featEl = document.getElementById('tierFeatures');\n  if (!numEl || !featEl) return;\n  numEl.textContent = t.id;\n  const feats = [];\n  if (t.moving) feats.push('MOVING');\n  if (t.spikes) feats.push('SPIKES');\n  if (t.saw)    feats.push('SAWS');\n  featEl.textContent = feats.length ? '• ' + feats.join(' • ') : 'PLAIN';\n  // flash the pill on tier change\n  const pill = document.getElementById('tierPill');\n  if (pill) {\n    pill.setAttribute('fill', '#ff6b5b');\n    setTimeout(() => pill.setAttribute('fill', '#20201f'), 450);\n  }\n}\n\n// ===== DOM refs =====\nconst world = document.getElementById('world');\nconst stage = document.getElementById('stage');\nconst ballGroup = document.getElementById('ballGroup');\nconst ballInner = document.getElementById('ballInner');\nconst obstacleLayer = document.getElementById('obstacleLayer');\nconst powerupLayer = document.getElementById('powerupLayer');\nconst trailLayer = document.getElementById('trailLayer');\nconst cloudLayer = document.getElementById('cloudLayer');\nconst hillLayer = document.getElementById('hillLayer');\nconst groundBand = document.getElementById('groundBand');\nconst grassBand = document.getElementById('grassBand');\nconst scoreText = document.getElementById('scoreText');\nconst bestText = document.getElementById('bestText');\nconst finalScore = document.getElementById('finalScore');\nconst finalBest = document.getElementById('finalBest');\nconst startHintG = document.getElementById('startHintG');\nconst pauseG = document.getElementById('pauseG');\nconst gameOverG = document.getElementById('gameOverG');\nconst bannerG = document.getElementById('bannerG');\nconst medalSlot = document.getElementById('medalSlot');\n\n// ===== Init scenery =====\nfunction initClouds() {\n  state.clouds = [];\n  cloudLayer.innerHTML = '';\n  for (let i = 0; i < 6; i++) {\n    const c = { x: Math.random() * W, y: 60 + Math.random() * 300, s: 0.7 + Math.random() * 0.8 };\n    state.clouds.push(c);\n    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');\n    g.setAttribute('class', 'cloud');\n    g.innerHTML = `\n      <ellipse cx=\"0\" cy=\"0\" rx=\"${36*c.s}\" ry=\"${14*c.s}\" fill=\"#ffffff\" opacity=\"0.85\"/>\n      <ellipse cx=\"-20\" cy=\"5\" rx=\"${22*c.s}\" ry=\"${10*c.s}\" fill=\"#ffffff\" opacity=\"0.85\"/>\n      <ellipse cx=\"22\" cy=\"4\" rx=\"${24*c.s}\" ry=\"${11*c.s}\" fill=\"#ffffff\" opacity=\"0.85\"/>\n    `;\n    cloudLayer.appendChild(g);\n    c.el = g;\n  }\n}\n\nfunction initHills() {\n  state.hills = [];\n  hillLayer.innerHTML = '';\n  for (let i = 0; i < 5; i++) {\n    const h = { x: i * 180 - 40, y: 700, w: 260, h: 180 };\n    state.hills.push(h);\n    const g = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n    g.setAttribute('fill', '#6ea89a');\n    g.setAttribute('opacity', '0.85');\n    hillLayer.appendChild(g);\n    h.el = g;\n  }\n  renderHills();\n}\nfunction renderHills() {\n  state.hills.forEach(h => {\n    const x = h.x, y = h.y, w = h.w;\n    h.el.setAttribute('d', `M ${x} 880 Q ${x + w/2} ${y - 40} ${x + w} 880 Z`);\n  });\n}\n\n// ===== Pesky pipe-dweller (the annoying guy) =====\n// Original character: red beanie, big mustache, green scarf, blue overalls.\n// Not Mario. Pops out of a pipe to wave/point at you. Purely decorative.\nfunction peskyGuySVG() {\n  return `\n    <g class=\"pesky-body\">\n      <!-- overalls/body -->\n      <rect x=\"-14\" y=\"8\" width=\"28\" height=\"22\" rx=\"3\" fill=\"#2d5ec9\" stroke=\"#0c1f4a\" stroke-width=\"2\"/>\n      <rect x=\"-10\" y=\"6\" width=\"6\" height=\"10\" rx=\"1.5\" fill=\"#2d5ec9\" stroke=\"#0c1f4a\" stroke-width=\"2\"/>\n      <rect x=\"4\" y=\"6\" width=\"6\" height=\"10\" rx=\"1.5\" fill=\"#2d5ec9\" stroke=\"#0c1f4a\" stroke-width=\"2\"/>\n      <!-- yellow buttons -->\n      <circle cx=\"-7\" cy=\"16\" r=\"1.8\" fill=\"#ffd44a\" stroke=\"#8a6814\" stroke-width=\"1\"/>\n      <circle cx=\"7\" cy=\"16\" r=\"1.8\" fill=\"#ffd44a\" stroke=\"#8a6814\" stroke-width=\"1\"/>\n      <!-- arm + waving hand (animated) -->\n      <g class=\"pesky-arm\" style=\"transform-origin: -10px 10px;\">\n        <rect x=\"-20\" y=\"8\" width=\"8\" height=\"4\" rx=\"2\" fill=\"#2d5ec9\" stroke=\"#0c1f4a\" stroke-width=\"2\"/>\n        <circle cx=\"-22\" cy=\"10\" r=\"4\" fill=\"#f5c79a\" stroke=\"#6b3a1e\" stroke-width=\"2\"/>\n      </g>\n      <!-- head -->\n      <circle cx=\"0\" cy=\"-4\" r=\"11\" fill=\"#f5c79a\" stroke=\"#6b3a1e\" stroke-width=\"2\"/>\n      <!-- mustache (thick, bushy) -->\n      <path d=\"M -8 2 Q -5 6 0 4 Q 5 6 8 2 Q 6 -1 3 0 Q 0 1 -3 0 Q -6 -1 -8 2 Z\" fill=\"#3a1f0c\" stroke=\"#1a0a00\" stroke-width=\"1\"/>\n      <!-- nose -->\n      <ellipse cx=\"0\" cy=\"-1\" rx=\"2.5\" ry=\"2\" fill=\"#e8a678\" stroke=\"#8a4e28\" stroke-width=\"1\"/>\n      <!-- eyes -->\n      <circle cx=\"-4\" cy=\"-6\" r=\"1.5\" fill=\"#1a1a1a\"/>\n      <circle cx=\"4\" cy=\"-6\" r=\"1.5\" fill=\"#1a1a1a\"/>\n      <!-- beanie (not a branded cap: rounded beanie with pom) -->\n      <path d=\"M -11 -6 Q -12 -16 0 -17 Q 12 -16 11 -6 Z\" fill=\"#e04436\" stroke=\"#6b1e12\" stroke-width=\"2\"/>\n      <rect x=\"-11.5\" y=\"-7\" width=\"23\" height=\"3\" fill=\"#b82f24\" stroke=\"#6b1e12\" stroke-width=\"1.5\"/>\n      <circle cx=\"0\" cy=\"-18\" r=\"2.5\" fill=\"#ffd44a\" stroke=\"#8a6814\" stroke-width=\"1\"/>\n    </g>\n  `;\n}\n\nconst SVG_NS = 'http://www.w3.org/2000/svg';\n\n// ===== Obstacles =====\nlet obsIdCounter = 0;\nfunction spawnObstacle() {\n  const t = tierFor(state.score);\n  const gap = tweaks.gapSize != null ? Math.max(100, tweaks.gapSize - (t.id - 1) * 8) : t.gap;\n  const margin = 120;\n  const gapY = margin + Math.random() * (GROUND_Y - margin * 2 - gap);\n  const ob = {\n    id: ++obsIdCounter,\n    x: W + 40,\n    topY: 0, topH: gapY,\n    botY: gapY + gap, botH: GROUND_Y - (gapY + gap),\n    gapY, gap,\n    baseGapY: gapY,\n    color: t.color,\n    moving: t.moving,\n    spikes: t.spikes,\n    saw: t.saw,\n    tier: t.id,\n    phase: Math.random() * Math.PI * 2,\n    amp: t.moving ? 50 : 0,\n    scored: false\n  };\n  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');\n  g.setAttribute('data-id', ob.id);\n\n  // Top pipe body\n  const topPipe = document.createElementNS('http://www.w3.org/2000/svg', 'g');\n  topPipe.classList.add('top-pipe');\n  const pipeW = 70;\n  topPipe.innerHTML = `\n    <rect x=\"-${pipeW/2}\" y=\"0\" width=\"${pipeW}\" height=\"${ob.topH - 20}\" fill=\"${t.color}\" stroke=\"#1a3d33\" stroke-width=\"3\"/>\n    <rect x=\"-${pipeW/2 + 6}\" y=\"${ob.topH - 22}\" width=\"${pipeW + 12}\" height=\"24\" rx=\"3\" fill=\"${t.color}\" stroke=\"#1a3d33\" stroke-width=\"3\"/>\n    ${t.spikes ? spikes(pipeW, ob.topH - 2, 'down') : ''}\n  `;\n\n  // Bottom pipe body\n  const botPipe = document.createElementNS('http://www.w3.org/2000/svg', 'g');\n  botPipe.classList.add('bot-pipe');\n  botPipe.innerHTML = `\n    <rect x=\"-${pipeW/2 + 6}\" y=\"${ob.botY}\" width=\"${pipeW + 12}\" height=\"24\" rx=\"3\" fill=\"${t.color}\" stroke=\"#1a3d33\" stroke-width=\"3\"/>\n    <rect x=\"-${pipeW/2}\" y=\"${ob.botY + 22}\" width=\"${pipeW}\" height=\"${ob.botH - 22}\" fill=\"${t.color}\" stroke=\"#1a3d33\" stroke-width=\"3\"/>\n    ${t.spikes ? spikes(pipeW, ob.botY + 2, 'up') : ''}\n  `;\n\n  g.appendChild(topPipe);\n  g.appendChild(botPipe);\n\n  // Saw blade in middle of gap\n  if (t.saw) {\n    const saw = document.createElementNS('http://www.w3.org/2000/svg', 'g');\n    saw.setAttribute('class', 'saw-blade' + (Math.random() > 0.5 ? ' reverse' : ''));\n    saw.setAttribute('transform', `translate(0 ${ob.gapY + ob.gap/2})`);\n    saw.innerHTML = sawSVG(22);\n    g.appendChild(saw);\n    ob.sawEl = saw;\n    ob.sawR = 22;\n  }\n\n  obstacleLayer.appendChild(g);\n  ob.el = g;\n  ob.topEl = topPipe;\n  ob.botEl = botPipe;\n\n  // Pesky guy: ~22% chance. Emerges from the top lip of the bottom pipe, waves, ducks back.\n  // Clipped to the area ABOVE the pipe lip so he's fully hidden while tucked inside.\n  if (Math.random() < 0.22) {\n    const peskyG = document.createElementNS(SVG_NS, 'g');\n    peskyG.setAttribute('class', 'pesky');\n    peskyG.innerHTML = peskyGuySVG();\n    // Mount point: the top line of the bottom pipe lip (where he emerges from)\n    const mountY = ob.gapY + ob.gap;\n    // Clip path: only pixels ABOVE mountY are visible. When tucked below, he's invisible.\n    const clipId = `peskyClip-${ob.id}`;\n    const clip = document.createElementNS(SVG_NS, 'clipPath');\n    clip.setAttribute('id', clipId);\n    const clipRect = document.createElementNS(SVG_NS, 'rect');\n    clipRect.setAttribute('x', '-40');\n    clipRect.setAttribute('y', '-600');\n    clipRect.setAttribute('width', '80');\n    clipRect.setAttribute('height', '600');  // area above mountY (y=0 in wrap coords)\n    clip.appendChild(clipRect);\n    g.appendChild(clip);\n    const clipWrap = document.createElementNS(SVG_NS, 'g');\n    clipWrap.setAttribute('clip-path', `url(#${clipId})`);\n    clipWrap.setAttribute('transform', `translate(0 ${mountY})`);\n    clipWrap.appendChild(peskyG);\n    // Hidden initial position: translate down so his entire body is below mountY (clipped out)\n    peskyG.setAttribute('transform', `translate(0 40)`);\n    g.appendChild(clipWrap);\n    ob.pesky = {\n      el: peskyG,\n      wrap: clipWrap,\n      mountY,\n      state: 'waiting',   // waiting -> rising -> waving -> retreating -> done\n      t: 0,\n      // Trigger when pipe gets close to the ball\n      triggerX: BALL_X + 140 + Math.random() * 80\n    };\n  }\n\n  state.obstacles.push(ob);\n\n  // Random power-up — rarer at low tiers, more common at high tiers where you need the help\n  const tierRates = { 1: 0, 2: 0.08, 3: 0.18, 4: 0.32, 5: 0.42 };\n  const rate = tierRates[t.id] ?? 0.25;\n  if (Math.random() < rate) {\n    maybeSpawnPowerup(ob);\n  }\n}\n\n// ===== Power-ups =====\nconst POWERUPS = {\n  shield: { color: '#6fd4ff', stroke: '#1a5a82', label: 'SHIELD',  icon: 'shield' },\n  slow:   { color: '#b78cff', stroke: '#4b2f8a', label: 'SLOW-MO', icon: 'clock' },\n  x2:     { color: '#ffd44a', stroke: '#8a6814', label: '2X',      icon: 'star' }\n};\nconst POWERUP_KEYS = Object.keys(POWERUPS);\n\nfunction powerupIconSVG(kind) {\n  if (kind === 'shield') {\n    return `<path d=\"M 0 -12 L 10 -6 L 10 4 Q 10 12 0 16 Q -10 12 -10 4 L -10 -6 Z\"\n             fill=\"#fff\" stroke=\"#1a1a1a\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/>`;\n  }\n  if (kind === 'clock') {\n    return `<circle r=\"10\" fill=\"#fff\" stroke=\"#1a1a1a\" stroke-width=\"1.8\"/>\n            <line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"-7\" stroke=\"#1a1a1a\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n            <line x1=\"0\" y1=\"0\" x2=\"5\" y2=\"2\" stroke=\"#1a1a1a\" stroke-width=\"2\" stroke-linecap=\"round\"/>`;\n  }\n  if (kind === 'star') {\n    let p = '';\n    for (let i = 0; i < 10; i++) {\n      const a = (i / 10) * Math.PI * 2 - Math.PI/2;\n      const r = i % 2 === 0 ? 11 : 4.5;\n      const x = Math.cos(a) * r, y = Math.sin(a) * r;\n      p += (i === 0 ? 'M ' : 'L ') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';\n    }\n    p += 'Z';\n    return `<path d=\"${p}\" fill=\"#fff\" stroke=\"#1a1a1a\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/>`;\n  }\n  return '';\n}\n\nconst fxGroup = document.getElementById('fxGroup');\n\nfunction updateFXHUD() {\n  if (!fxGroup) return;\n  const badges = [];\n  if (state.fx.shield > 0) badges.push({ color: '#6fd4ff', stroke: '#1a5a82', label: 'SHIELD', icon: 'shield' });\n  if (state.fx.slowmo > 0) badges.push({ color: '#b78cff', stroke: '#4b2f8a', label: Math.ceil(state.fx.slowmo/1000) + 's', icon: 'clock' });\n  if (state.fx.x2 > 0)     badges.push({ color: '#ffd44a', stroke: '#8a6814', label: '2X ×' + state.fx.x2, icon: 'star' });\n  let x = 0;\n  fxGroup.innerHTML = badges.map(bd => {\n    const w = 78, h = 32;\n    const g = `<g transform=\"translate(${x} 0)\">\n      <rect x=\"0\" y=\"0\" width=\"${w}\" height=\"${h}\" rx=\"16\" fill=\"${bd.color}\" stroke=\"${bd.stroke}\" stroke-width=\"2\" opacity=\"0.96\"/>\n      <g transform=\"translate(14 ${h/2}) scale(0.75)\">${powerupIconSVG(bd.icon)}</g>\n      <text x=\"${w - 10}\" y=\"${h/2 + 5}\" text-anchor=\"end\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"13\"\n            fill=\"#0c0e14\">${bd.label}</text>\n    </g>`;\n    x += w + 8;\n    return g;\n  }).join('');\n}\n\nfunction maybeSpawnPowerup(ob) {\n  const kind = POWERUP_KEYS[Math.floor(Math.random() * POWERUP_KEYS.length)];\n  const conf = POWERUPS[kind];\n  // Place it between this obstacle and the next — roughly a pipe-interval to the right,\n  // vertically centered in THIS obstacle's gap (easy to aim for).\n  const gY = ob.gapY + ob.gap / 2;\n  const x = ob.x + 220 + Math.random() * 60;\n  const pu = {\n    kind, x, y: gY,\n    baseY: gY,\n    phase: Math.random() * Math.PI * 2,\n    collected: false\n  };\n  const g = document.createElementNS(SVG_NS, 'g');\n  g.setAttribute('class', 'powerup');\n  g.innerHTML = `\n    <!-- soft outer glow halo (pulses) -->\n    <circle r=\"34\" fill=\"${conf.color}\" opacity=\"0.22\">\n      <animate attributeName=\"r\" values=\"30;40;30\" dur=\"1.6s\" repeatCount=\"indefinite\"/>\n      <animate attributeName=\"opacity\" values=\"0.18;0.32;0.18\" dur=\"1.6s\" repeatCount=\"indefinite\"/>\n    </circle>\n    <!-- outer ring (pulses) -->\n    <circle r=\"27\" fill=\"none\" stroke=\"${conf.color}\" stroke-width=\"2\" opacity=\"0.7\">\n      <animate attributeName=\"r\" values=\"25;30;25\" dur=\"1.2s\" repeatCount=\"indefinite\"/>\n    </circle>\n    <!-- body -->\n    <circle r=\"22\" fill=\"${conf.color}\" stroke=\"${conf.stroke}\" stroke-width=\"3\" opacity=\"0.98\"/>\n    <circle r=\"22\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"1.5\" opacity=\"0.55\"/>\n    <!-- sparkle rays, rotating slowly -->\n    <g opacity=\"0.85\">\n      <g>\n        <line x1=\"0\" y1=\"-30\" x2=\"0\" y2=\"-24\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n        <line x1=\"0\" y1=\"30\"  x2=\"0\" y2=\"24\"  stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n        <line x1=\"-30\" y1=\"0\" x2=\"-24\" y2=\"0\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n        <line x1=\"30\" y1=\"0\"  x2=\"24\" y2=\"0\"  stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n        <animateTransform attributeName=\"transform\" type=\"rotate\" from=\"0\" to=\"360\" dur=\"4s\" repeatCount=\"indefinite\"/>\n      </g>\n    </g>\n    ${powerupIconSVG(conf.icon)}\n  `;\n  pu.el = g;\n  powerupLayer.appendChild(g);\n  state.powerups.push(pu);\n}\n\nfunction collectPowerup(pu) {\n  SFX.powerup();\n  pu.collected = true;\n  if (pu.kind === 'shield') state.fx.shield = Math.max(state.fx.shield, 1); // 1 hit\n  if (pu.kind === 'slow')   state.fx.slowmo = 3200; // ms\n  if (pu.kind === 'x2')     state.fx.x2 = 5; // next 5 pipes\n  // Little flash: pop the powerup\n  pu.el.innerHTML = `<circle r=\"30\" fill=\"#fff\" opacity=\"0.8\"><animate attributeName=\"r\" from=\"22\" to=\"60\" dur=\"0.35s\" fill=\"freeze\"/><animate attributeName=\"opacity\" from=\"0.9\" to=\"0\" dur=\"0.35s\" fill=\"freeze\"/></circle>`;\n  setTimeout(() => { if (pu.el && pu.el.parentNode) pu.el.parentNode.removeChild(pu.el); }, 400);\n  updateFXHUD();\n}\n\nfunction spikes(pipeW, y, dir) {\n  const n = 7, step = (pipeW + 8) / n;\n  let path = '';\n  for (let i = 0; i < n; i++) {\n    const x1 = -pipeW/2 - 4 + i * step;\n    const x2 = x1 + step;\n    const mx = (x1 + x2) / 2;\n    if (dir === 'down') {\n      path += `M ${x1} ${y} L ${mx} ${y + 26} L ${x2} ${y} Z `;\n    } else {\n      path += `M ${x1} ${y} L ${mx} ${y - 26} L ${x2} ${y} Z `;\n    }\n  }\n  return `<path d=\"${path}\" fill=\"#e04436\" stroke=\"#5b170d\" stroke-width=\"2.5\" stroke-linejoin=\"miter\"/>`;\n}\n\nfunction sawSVG(r) {\n  const teeth = 10;\n  let path = '';\n  for (let i = 0; i < teeth; i++) {\n    const a1 = (i / teeth) * Math.PI * 2;\n    const a2 = ((i + 0.5) / teeth) * Math.PI * 2;\n    const a3 = ((i + 1) / teeth) * Math.PI * 2;\n    const r1 = r, r2 = r + 6;\n    const p1 = [Math.cos(a1) * r1, Math.sin(a1) * r1];\n    const p2 = [Math.cos(a2) * r2, Math.sin(a2) * r2];\n    const p3 = [Math.cos(a3) * r1, Math.sin(a3) * r1];\n    if (i === 0) path += `M ${p1[0]} ${p1[1]} `;\n    path += `L ${p2[0]} ${p2[1]} L ${p3[0]} ${p3[1]} `;\n  }\n  path += 'Z';\n  return `\n    <path d=\"${path}\" fill=\"#cdd1dc\" stroke=\"#2a2a2a\" stroke-width=\"2\"/>\n    <circle r=\"8\" fill=\"#ff6b5b\" stroke=\"#2a2a2a\" stroke-width=\"2\"/>\n    <circle r=\"2\" fill=\"#2a2a2a\"/>\n  `;\n}\n\n// ===== Player visuals =====\nfunction applyBallPalette() {\n  // Ball is now the logo badge — palette only drives accent UI + trail color\n  const pal = BALL_PALETTES[tweaks.ballPalette] || BALL_PALETTES.coral;\n  const startBtnRect = startHintG.querySelector('g rect');\n  if (startBtnRect) startBtnRect.setAttribute('fill', pal.mid);\n  const overBtn = gameOverG.querySelector('g[transform=\"translate(270 620)\"] rect');\n  if (overBtn) overBtn.setAttribute('fill', pal.mid);\n  const finalBestEl = document.getElementById('finalBest');\n  if (finalBestEl) finalBestEl.setAttribute('fill', pal.mid);\n}\n\n// ===== Sky transition by score =====\nfunction updateSky(score) {\n  const stops = {\n    0:  ['#ffd3a8', '#9fd4ea', '#c6e9f2'],     // dawn\n    10: ['#ffb58a', '#7ab8d4', '#a6d4e0'],     // day\n    20: ['#e88a6b', '#5a7db4', '#6b88a8'],     // dusk\n    25: ['#3d3a6e', '#22264d', '#14163a']      // night\n  };\n  const keys = [0, 10, 20, 25];\n  let lo = 0, hi = 25;\n  for (let i = 0; i < keys.length - 1; i++) {\n    if (score >= keys[i] && score < keys[i+1]) { lo = keys[i]; hi = keys[i+1]; break; }\n    if (score >= keys[keys.length-1]) { lo = hi = keys[keys.length-1]; }\n  }\n  const t = lo === hi ? 0 : (score - lo) / (hi - lo);\n  const a = stops[lo], b = stops[hi];\n  const mix = (c1, c2, t) => {\n    const p = (h) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];\n    const [r1,g1,b1] = p(c1), [r2,g2,b2] = p(c2);\n    const r = Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), bl=Math.round(b1+(b2-b1)*t);\n    return `rgb(${r},${g},${bl})`;\n  };\n  document.getElementById('skyTop').setAttribute('stop-color', mix(a[0], b[0], t));\n  document.getElementById('skyMid').setAttribute('stop-color', mix(a[1], b[1], t));\n  document.getElementById('skyBot').setAttribute('stop-color', mix(a[2], b[2], t));\n}\n\n// ===== Collision =====\nfunction circleRect(cx, cy, cr, rx, ry, rw, rh) {\n  const closestX = Math.max(rx, Math.min(cx, rx + rw));\n  const closestY = Math.max(ry, Math.min(cy, ry + rh));\n  const dx = cx - closestX, dy = cy - closestY;\n  return dx*dx + dy*dy < cr*cr;\n}\nfunction circleCircle(x1, y1, r1, x2, y2, r2) {\n  const dx = x1 - x2, dy = y1 - y2;\n  return dx*dx + dy*dy < (r1 + r2) * (r1 + r2);\n}\nfunction consumeShieldIfAny() {\n  if (state.fx.shield > 0) {\n    SFX.shieldHit();\n    state.fx.shield = 0;\n    // Brief invulnerability flash to prevent immediate re-hit\n    state.fx.iframes = 600;\n    updateFXHUD();\n    // Visual ping on the ball\n    const ping = document.createElementNS(SVG_NS, 'circle');\n    ping.setAttribute('r', '30');\n    ping.setAttribute('fill', 'none');\n    ping.setAttribute('stroke', '#6fd4ff');\n    ping.setAttribute('stroke-width', '4');\n    ping.innerHTML = `<animate attributeName=\"r\" from=\"26\" to=\"60\" dur=\"0.4s\" fill=\"freeze\"/><animate attributeName=\"opacity\" from=\"1\" to=\"0\" dur=\"0.4s\" fill=\"freeze\"/>`;\n    ballGroup.appendChild(ping);\n    setTimeout(() => ping.remove(), 450);\n    return true;\n  }\n  return false;\n}\n\nfunction checkCollision() {\n  const b = state.ball;\n  // Invulnerability frames after shield pop\n  if (state.fx.iframes && state.fx.iframes > 0) return false;\n  // Ground (shield doesn't save you from ground)\n  if (b.y + BALL_R >= GROUND_Y) {\n    if (consumeShieldIfAny()) { b.y = GROUND_Y - BALL_R - 4; b.vy = -8; return false; }\n    return true;\n  }\n  // Ceiling\n  if (b.y - BALL_R <= 0) { b.y = BALL_R; b.vy = 0; }\n  const pipeW = 70;\n  // Slight inset so you can graze the pipe sides without dying — feels fairer, especially with spikes.\n  const HIT_INSET = 5;\n  const hx = pipeW - HIT_INSET * 2;\n  for (const ob of state.obstacles) {\n    const px = ob.x - pipeW/2 + HIT_INSET;\n    // Top pipe body + lip\n    if (circleRect(b.x, b.y, BALL_R - 3, px, 0, hx, ob.gapY)) {\n      if (consumeShieldIfAny()) return false;\n      return true;\n    }\n    // Bottom pipe body + lip\n    if (circleRect(b.x, b.y, BALL_R - 3, px, ob.gapY + ob.gap, hx, GROUND_Y - (ob.gapY + ob.gap))) {\n      if (consumeShieldIfAny()) return false;\n      return true;\n    }\n    // Spikes: pointy triangles. Approximate each as a SMALL circle at ~1/3 the way down the spike\n    // (so only the tip kills — base is the pipe lip, which the rect above already covers).\n    if (ob.spikes) {\n      const n = 7, step = (pipeW + 8) / n;\n      const spikeR = 4; // small forgiving hitbox per spike\n      for (let s = 0; s < n; s++) {\n        const mx = ob.x - pipeW/2 - 4 + step * (s + 0.5);\n        // Top pipe's down-pointing spike tip sits at ob.gapY + 24 (visually the tip).\n        // Use a point 2/3 down the spike so a near-miss at the tip is survivable.\n        const topTipY = ob.gapY + 16;\n        if (circleCircle(b.x, b.y, BALL_R - 4, mx, topTipY, spikeR)) {\n          if (consumeShieldIfAny()) return false;\n          return true;\n        }\n        // Bottom pipe's up-pointing spike tip sits at ob.gapY + ob.gap - 24.\n        const botTipY = ob.gapY + ob.gap - 16;\n        if (circleCircle(b.x, b.y, BALL_R - 4, mx, botTipY, spikeR)) {\n          if (consumeShieldIfAny()) return false;\n          return true;\n        }\n      }\n    }\n    // saw in middle\n    if (ob.saw) {\n      if (circleCircle(b.x, b.y, BALL_R - 3, ob.x, ob.gapY + ob.gap/2, ob.sawR - 3)) {\n        if (consumeShieldIfAny()) return false;\n        return true;\n      }\n    }\n    // Pesky guy: only lethal once he's out (rising/waving). His head is the hitbox.\n    // Additionally: only count the parts ABOVE the pipe lip (mountY) as collidable,\n    // since everything below mountY is visually clipped away.\n    if (ob.pesky && (ob.pesky.state === 'rising' || ob.pesky.state === 'waving')) {\n      const tr = ob.pesky.el.getAttribute('transform') || '';\n      const m = tr.match(/translate\\(0 (-?\\d+(?:\\.\\d+)?)\\)/);\n      const off = m ? parseFloat(m[1]) : 40;\n      const headY = ob.pesky.mountY + off - 4;\n      const headR = 11;\n      // Head only collides if it's visually above the pipe lip (fully emerged head).\n      if (headY + headR < ob.pesky.mountY &&\n          circleCircle(b.x, b.y, BALL_R - 2, ob.x, headY, headR)) {\n        if (consumeShieldIfAny()) return false;\n        return true;\n      }\n      // Body: clip the rect so only the part above mountY (visible) counts.\n      const bodyTop = ob.pesky.mountY + off + 8;   // head-to-body boundary\n      const bodyBot = ob.pesky.mountY + off + 30;\n      const visBot = Math.min(bodyBot, ob.pesky.mountY); // don't extend below pipe lip\n      if (visBot > bodyTop + 2 && // have at least a couple pixels of visible body\n          circleRect(b.x, b.y, BALL_R - 2, ob.x - 12, bodyTop, 24, visBot - bodyTop)) {\n        if (consumeShieldIfAny()) return false;\n        return true;\n      }\n    }\n  }\n  return false;\n}\n\n// ===== Milestones =====\nconst MILESTONES = [\n  { at: 5,  text: 'NICE!',    col: '#ffd66b' },\n  { at: 10, text: 'GREAT!',   col: '#ff9a8a' },\n  { at: 15, text: 'PRO!',     col: '#9779d6' },\n  { at: 20, text: 'INSANE!',  col: '#ff4a6b' },\n  { at: 25, text: 'LEGEND!', col: '#44c4a9' }\n];\nfunction showBanner(m) {\n  bannerG.innerHTML = `\n    <rect x=\"90\" y=\"280\" width=\"360\" height=\"90\" rx=\"18\" fill=\"${m.col}\" stroke=\"#2a1a10\" stroke-width=\"4\"/>\n    <text x=\"270\" y=\"340\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"52\"\n          fill=\"#fff\" stroke=\"#2a1a10\" stroke-width=\"5\" paint-order=\"stroke fill\">${m.text}</text>\n  `;\n  bannerG.style.opacity = 1;\n  bannerG.setAttribute('opacity', '1');\n  // reset animation\n  bannerG.style.animation = 'none';\n  void bannerG.getBoundingClientRect();\n  bannerG.style.animation = 'pop 1.6s ease-out forwards';\n}\n// drive banner via JS animation since SVG g doesn't support css animation inheritance well\nlet bannerStart = 0, bannerActive = false;\nfunction triggerBanner(m) {\n  bannerG.innerHTML = `\n    <g transform=\"translate(270 330)\">\n      <rect x=\"-180\" y=\"-45\" width=\"360\" height=\"90\" rx=\"18\" fill=\"${m.col}\" stroke=\"#2a1a10\" stroke-width=\"4\"/>\n      <text y=\"18\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"52\"\n            fill=\"#fff\" stroke=\"#2a1a10\" stroke-width=\"5\" paint-order=\"stroke fill\">${m.text}</text>\n    </g>\n  `;\n  bannerStart = performance.now();\n  bannerActive = true;\n  bannerG.setAttribute('opacity', '1');\n}\nfunction updateBanner(now) {\n  if (!bannerActive) return;\n  const t = (now - bannerStart) / 1700;\n  if (t >= 1) {\n    bannerActive = false;\n    bannerG.setAttribute('opacity', '0');\n    bannerG.innerHTML = '';\n    return;\n  }\n  let scale, alpha, ty;\n  if (t < 0.2) {\n    const k = t / 0.2;\n    scale = 0.5 + k * 0.7;\n    alpha = k;\n    ty = 0;\n  } else if (t < 0.75) {\n    scale = 1.2 - (t - 0.2) / 0.55 * 0.2;\n    alpha = 1;\n    ty = 0;\n  } else {\n    const k = (t - 0.75) / 0.25;\n    scale = 1;\n    alpha = 1 - k;\n    ty = -k * 30;\n  }\n  bannerG.setAttribute('opacity', alpha);\n  const firstG = bannerG.querySelector('g');\n  if (firstG) firstG.setAttribute('transform', `translate(270 ${330 + ty}) scale(${scale})`);\n}\n\n// ===== Medal =====\nfunction medalFor(score) {\n  if (score >= 100) return { name: 'PLATINUM', fill: '#c8e0ec', stroke: '#5d7b89' };\n  if (score >= 50)  return { name: 'GOLD',     fill: '#ffcf44', stroke: '#8a6814' };\n  if (score >= 25)  return { name: 'SILVER',   fill: '#d6d9e0', stroke: '#6b6e78' };\n  if (score >= 10)  return { name: 'BRONZE',   fill: '#d98550', stroke: '#6b3a1e' };\n  return null;\n}\nfunction renderMedal(score) {\n  medalSlot.innerHTML = '';\n  const m = medalFor(score);\n  if (!m) {\n    medalSlot.innerHTML = `\n      <circle cx=\"30\" cy=\"30\" r=\"30\" fill=\"#eee\" stroke=\"#c9cdd4\" stroke-width=\"3\" stroke-dasharray=\"4 4\"/>\n      <text x=\"30\" y=\"36\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"700\" font-size=\"10\" fill=\"#9aa0ae\">NO MEDAL</text>\n    `;\n    return;\n  }\n  medalSlot.innerHTML = `\n    <circle cx=\"30\" cy=\"30\" r=\"34\" fill=\"${m.fill}\" stroke=\"${m.stroke}\" stroke-width=\"4\"/>\n    <circle cx=\"30\" cy=\"30\" r=\"24\" fill=\"none\" stroke=\"${m.stroke}\" stroke-width=\"2\" opacity=\"0.6\"/>\n    <text x=\"30\" y=\"34\" text-anchor=\"middle\" font-family=\"Rubik\" font-weight=\"900\" font-size=\"12\" fill=\"${m.stroke}\">${m.name}</text>\n    <path d=\"M 5 40 L 0 70 L 15 60 L 30 70 L 45 60 L 60 70 L 55 40 Z\" fill=\"${m.fill}\" stroke=\"${m.stroke}\" stroke-width=\"3\" opacity=\"0.9\"/>\n  `;\n}\n\n// ===== Core loop =====\nfunction flap() {\n  if (state.mode === 'start') startGame();\n  if (state.mode === 'over') { resetGame(); return; }\n  if (state.mode !== 'play') return;\n  SFX.flap();\n  state.ball.vy = -tweaks.flap;\n  // trail snapshot\n  state.trail.push({ x: state.ball.x, y: state.ball.y, t: performance.now() });\n  if (state.trail.length > 6) state.trail.shift();\n}\n\nconst LOGOS = [\n  (window.__resources && window.__resources.logo1) || 'assets/player-logo.png',\n  (window.__resources && window.__resources.logo2) || 'assets/player-logo-2.png'\n];\nlet logoIdx = 0;\nlet hasStartedOnce = false;\nfunction applyLogo() {\n  const img = document.getElementById('ballImage');\n  if (img) img.setAttribute('href', LOGOS[logoIdx]);\n}\nfunction cycleLogo() {\n  logoIdx = (logoIdx + 1) % LOGOS.length;\n  applyLogo();\n}\n\nfunction startGame() {\n  if (hasStartedOnce) cycleLogo();\n  hasStartedOnce = true;\n  state.mode = 'play';\n  state.ball = { x: BALL_X, y: 480, vy: 0, rot: 0 };\n  state.obstacles = [];\n  obstacleLayer.innerHTML = '';\n  state.powerups = [];\n  powerupLayer.innerHTML = '';\n  state.fx = { shield: 0, slowmo: 0, x2: 0 };\n  updateFXHUD();\n  // Apply Start-at-tier tweak\n  const tierStarts = [0, 0, 5, 10, 15, 20];\n  state.score = tierStarts[Math.max(1, Math.min(5, tweaks.startTier || 1))];\n  state.scrollX = 0;\n  state.spawnTimer = 900;\n  state.shown = {};\n  state.trail = [];\n  scoreText.textContent = state.score;\n  _lastTierShown = -1;\n  updateTierHUD(state.score);\n  updateSky(state.score);\n  startHintG.setAttribute('opacity', '0');\n  gameOverG.setAttribute('opacity', '0');\n  bannerG.innerHTML = '';\n  state.lastT = performance.now();\n}\n\nfunction resetGame() {\n  gameOverG.setAttribute('opacity', '0');\n  startGame();\n}\n\nfunction gameOver() {\n  if (state.mode !== 'play') return;\n  SFX.gameOver();\n  state.mode = 'over';\n  state.best = Math.max(state.best, state.score);\n  bestText.textContent = state.best;\n  finalScore.textContent = state.score;\n  finalBest.textContent = state.best;\n  renderMedal(state.score);\n  gameOverG.setAttribute('opacity', '1');\n  stage.classList.add('shake');\n  setTimeout(() => stage.classList.remove('shake'), 380);\n}\n\nfunction togglePause() {\n  if (state.mode === 'play') {\n    state.mode = 'pause';\n    pauseG.setAttribute('opacity', '1');\n  } else if (state.mode === 'pause') {\n    state.mode = 'play';\n    pauseG.setAttribute('opacity', '0');\n    state.lastT = performance.now();\n  }\n}\n\nfunction update(dt, now) {\n  if (state.mode !== 'play') return;\n  const t = tierFor(state.score);\n  // Slow-mo: halve scroll speed while active\n  const slowFactor = state.fx.slowmo > 0 ? 0.5 : 1;\n  const speed = t.speed * (tweaks.baseSpeed / 3) * slowFactor;\n  state.scrollX += speed;\n\n  // Tick FX timers\n  if (state.fx.slowmo > 0) {\n    state.fx.slowmo = Math.max(0, state.fx.slowmo - dt);\n    updateFXHUD();\n  }\n  if (state.fx.iframes && state.fx.iframes > 0) {\n    state.fx.iframes = Math.max(0, state.fx.iframes - dt);\n  }\n\n  // ball physics\n  const b = state.ball;\n  b.vy += tweaks.gravity;\n  if (b.vy > 14) b.vy = 14;\n  b.y += b.vy;\n  // rotation based on vy\n  const targetRot = Math.max(-25, Math.min(75, b.vy * 6));\n  b.rot += (targetRot - b.rot) * 0.18;\n\n  // spawn\n  state.spawnTimer -= dt;\n  if (state.spawnTimer <= 0) {\n    spawnObstacle();\n    state.spawnTimer = t.interval * (3 / Math.max(1.5, tweaks.baseSpeed));\n  }\n\n  // move obstacles\n  for (let i = state.obstacles.length - 1; i >= 0; i--) {\n    const ob = state.obstacles[i];\n    ob.x -= speed;\n    if (ob.moving) {\n      ob.phase += 0.03;\n      const dy = Math.sin(ob.phase) * ob.amp;\n      ob.gapY = ob.baseGapY + dy;\n    }\n    // score when passed\n    if (!ob.scored && ob.x + 40 < b.x) {\n      ob.scored = true;\n      // 2x bonus ticks down per pipe\n      const inc = state.fx.x2 > 0 ? 2 : 1;\n      if (state.fx.x2 > 0) { state.fx.x2 -= 1; updateFXHUD(); }\n      state.score += inc;\n      SFX.score();\n      scoreText.textContent = state.score;\n      updateTierHUD(state.score);\n      // milestone?\n      const m = MILESTONES.find(m => m.at === state.score);\n      if (m && !state.shown[m.at]) {\n        state.shown[m.at] = true;\n        triggerBanner(m);\n        SFX.milestone();\n      }\n      updateSky(state.score);\n    }\n\n    // Pesky guy state machine\n    if (ob.pesky) {\n      const p = ob.pesky;\n      if (p.state === 'waiting' && ob.x <= p.triggerX) {\n        p.state = 'rising';\n        p.t = 0;\n      }\n      if (p.state !== 'waiting' && p.state !== 'done') {\n        p.t += dt;\n        let offset = 40; // fully hidden (below mountY, clipped out)\n        const EMERGED = -36; // feet above the pipe lip -> fully visible\n        if (p.state === 'rising') {\n          const k = Math.min(1, p.t / 300);\n          const e = 1 - Math.pow(1 - k, 3); // ease-out cubic\n          offset = 40 + e * (EMERGED - 40);\n          if (k >= 1) { p.state = 'waving'; p.t = 0; }\n        } else if (p.state === 'waving') {\n          offset = EMERGED;\n          const arm = p.el.querySelector('.pesky-arm');\n          if (arm) {\n            const wave = Math.sin(p.t * 0.018) * 35;\n            arm.setAttribute('transform', `rotate(${wave} -10 10)`);\n          }\n          if (p.t > 1100) { p.state = 'retreating'; p.t = 0; }\n        } else if (p.state === 'retreating') {\n          const k = Math.min(1, p.t / 260);\n          const e = k * k;\n          offset = EMERGED + e * (40 - EMERGED);\n          if (k >= 1) { p.state = 'done'; }\n        }\n        p.el.setAttribute('transform', `translate(0 ${offset})`);\n      }\n    }\n    // remove offscreen\n    if (ob.x < -80) {\n      ob.el.remove();\n      state.obstacles.splice(i, 1);\n    }\n  }\n\n  // Power-ups: move with scroll, bob, detect pickup\n  for (let i = state.powerups.length - 1; i >= 0; i--) {\n    const pu = state.powerups[i];\n    if (pu.collected) { state.powerups.splice(i, 1); continue; }\n    pu.x -= speed;\n    pu.phase += 0.08;\n    pu.y = pu.baseY + Math.sin(pu.phase) * 10;\n    pu.el.setAttribute('transform', `translate(${pu.x} ${pu.y})`);\n    // Collision with ball\n    const dx = pu.x - b.x, dy = pu.y - b.y;\n    if (dx * dx + dy * dy < (BALL_R + 22) * (BALL_R + 22)) {\n      collectPowerup(pu);\n    }\n    // Offscreen cleanup\n    if (pu.x < -60) {\n      pu.el.remove();\n      state.powerups.splice(i, 1);\n    }\n  }\n\n  // parallax clouds\n  for (const c of state.clouds) {\n    c.x -= 0.3 * speed;\n    if (c.x < -60) c.x += W + 120;\n    c.el.setAttribute('transform', `translate(${c.x} ${c.y})`);\n  }\n  // hills\n  for (const h of state.hills) {\n    h.x -= 0.5 * speed;\n    if (h.x + h.w < -40) h.x += state.hills.length * 180;\n  }\n  renderHills();\n  // ground offset via pattern\n  const gx = (-state.scrollX % 40 + 40) % 40;\n  groundBand.setAttribute('x', -gx);\n  const grx = (-state.scrollX % 24 + 24) % 24;\n  grassBand.setAttribute('x', -grx);\n\n  // collision\n  if (checkCollision()) {\n    gameOver();\n  }\n\n  // banner\n  updateBanner(now);\n}\n\nfunction render() {\n  const b = state.ball;\n  ballGroup.setAttribute('transform', `translate(${b.x} ${b.y}) rotate(${b.rot})`);\n  // trail\n  trailLayer.innerHTML = '';\n  const now = performance.now();\n  state.trail.forEach((p, i) => {\n    const age = (now - p.t) / 600;\n    if (age < 1) {\n      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n      c.setAttribute('cx', p.x - (state.trail.length - i) * 2);\n      c.setAttribute('cy', p.y + (state.trail.length - i) * 2);\n      c.setAttribute('r', BALL_R * (1 - age * 0.4));\n      c.setAttribute('fill', BALL_PALETTES[tweaks.ballPalette]?.mid || '#ff6b5b');\n      c.setAttribute('opacity', (1 - age) * 0.25);\n      trailLayer.appendChild(c);\n    }\n  });\n  // update saw gap positions for moving pipes\n  for (const ob of state.obstacles) {\n    if (ob.moving) {\n      ob.topEl.querySelectorAll('rect').forEach((r, idx) => {\n        if (idx === 0) r.setAttribute('height', Math.max(0, ob.gapY - 20));\n        if (idx === 1) r.setAttribute('y', ob.gapY - 22);\n      });\n      // rebuild bottom pipe rects\n      const botRects = ob.botEl.querySelectorAll('rect');\n      if (botRects[0]) botRects[0].setAttribute('y', ob.gapY + ob.gap);\n      if (botRects[1]) {\n        botRects[1].setAttribute('y', ob.gapY + ob.gap + 22);\n        botRects[1].setAttribute('height', GROUND_Y - (ob.gapY + ob.gap + 22));\n      }\n      // spikes re-position\n      const topSpikes = ob.topEl.querySelector('path');\n      if (topSpikes) {\n        const pipeW = 70;\n        topSpikes.setAttribute('d', spikesPath(pipeW, ob.gapY - 2, 'down'));\n      }\n      const botSpikes = ob.botEl.querySelector('path');\n      if (botSpikes) {\n        const pipeW = 70;\n        botSpikes.setAttribute('d', spikesPath(pipeW, ob.gapY + ob.gap + 2, 'up'));\n      }\n      if (ob.sawEl) ob.sawEl.setAttribute('transform', `translate(0 ${ob.gapY + ob.gap/2})`);\n    }\n    ob.el.setAttribute('transform', `translate(${ob.x} 0)`);\n  }\n\n  // Debug hitbox overlay\n  if (tweaks.showHitboxes) drawHitboxes();\n  else {\n    const layer = document.getElementById('hitboxLayer');\n    if (layer && layer.firstChild) layer.innerHTML = '';\n  }\n}\n\nfunction drawHitboxes() {\n  const layer = document.getElementById('hitboxLayer');\n  if (!layer) return;\n  const pipeW = 70;\n  const HIT_INSET = 5;\n  const hx = pipeW - HIT_INSET * 2;\n  let svg = '';\n  // Ball\n  svg += `<circle cx=\"${state.ball.x}\" cy=\"${state.ball.y}\" r=\"${BALL_R - 3}\" fill=\"none\" stroke=\"#ff00ff\" stroke-width=\"1.5\"/>`;\n  for (const ob of state.obstacles) {\n    const px = ob.x - pipeW/2 + HIT_INSET;\n    // Top pipe hitbox\n    svg += `<rect x=\"${px}\" y=\"0\" width=\"${hx}\" height=\"${ob.gapY}\" fill=\"rgba(255,0,0,0.25)\" stroke=\"#ff3030\" stroke-width=\"1\"/>`;\n    // Bottom pipe hitbox\n    svg += `<rect x=\"${px}\" y=\"${ob.gapY + ob.gap}\" width=\"${hx}\" height=\"${GROUND_Y - (ob.gapY + ob.gap)}\" fill=\"rgba(255,0,0,0.25)\" stroke=\"#ff3030\" stroke-width=\"1\"/>`;\n    // Spikes\n    if (ob.spikes) {\n      const n = 7, step = (pipeW + 8) / n;\n      const spikeR = 4;\n      for (let s = 0; s < n; s++) {\n        const mx = ob.x - pipeW/2 - 4 + step * (s + 0.5);\n        svg += `<circle cx=\"${mx}\" cy=\"${ob.gapY + 16}\" r=\"${spikeR}\" fill=\"rgba(255,255,0,0.5)\" stroke=\"#ff0\" stroke-width=\"1\"/>`;\n        svg += `<circle cx=\"${mx}\" cy=\"${ob.gapY + ob.gap - 16}\" r=\"${spikeR}\" fill=\"rgba(255,255,0,0.5)\" stroke=\"#ff0\" stroke-width=\"1\"/>`;\n      }\n    }\n    // Saw\n    if (ob.saw) {\n      svg += `<circle cx=\"${ob.x}\" cy=\"${ob.gapY + ob.gap/2}\" r=\"${ob.sawR - 3}\" fill=\"rgba(0,255,255,0.3)\" stroke=\"#0ff\" stroke-width=\"1.5\"/>`;\n    }\n    // Pesky\n    if (ob.pesky && (ob.pesky.state === 'rising' || ob.pesky.state === 'waving')) {\n      const tr = ob.pesky.el.getAttribute('transform') || '';\n      const m = tr.match(/translate\\(0 (-?\\d+(?:\\.\\d+)?)\\)/);\n      const off = m ? parseFloat(m[1]) : 40;\n      const headY = ob.pesky.mountY + off - 4;\n      if (headY + 11 < ob.pesky.mountY) {\n        svg += `<circle cx=\"${ob.x}\" cy=\"${headY}\" r=\"11\" fill=\"rgba(255,120,0,0.35)\" stroke=\"#f60\" stroke-width=\"1\"/>`;\n      }\n      const bodyTop = ob.pesky.mountY + off + 8;\n      const bodyBot = ob.pesky.mountY + off + 30;\n      const visBot = Math.min(bodyBot, ob.pesky.mountY);\n      if (visBot > bodyTop + 2) {\n        svg += `<rect x=\"${ob.x - 12}\" y=\"${bodyTop}\" width=\"24\" height=\"${visBot - bodyTop}\" fill=\"rgba(255,120,0,0.35)\" stroke=\"#f60\" stroke-width=\"1\"/>`;\n      }\n    }\n  }\n  layer.innerHTML = svg;\n}\n\nfunction spikesPath(pipeW, y, dir) {\n  const n = 7, step = (pipeW + 8) / n;\n  let path = '';\n  for (let i = 0; i < n; i++) {\n    const x1 = -pipeW/2 - 4 + i * step;\n    const x2 = x1 + step;\n    const mx = (x1 + x2) / 2;\n    if (dir === 'down') {\n      path += `M ${x1} ${y} L ${mx} ${y + 26} L ${x2} ${y} Z `;\n    } else {\n      path += `M ${x1} ${y} L ${mx} ${y - 26} L ${x2} ${y} Z `;\n    }\n  }\n  return path;\n}\n\n// static obstacles still need transform on their root\nfunction renderStatic() {\n  for (const ob of state.obstacles) {\n    if (!ob.moving) ob.el.setAttribute('transform', `translate(${ob.x} 0)`);\n  }\n}\n\nfunction loop(now) {\n  const dt = Math.min(50, now - state.lastT);\n  state.lastT = now;\n  state.time = now;\n  update(dt, now);\n  render();\n  renderStatic();\n  requestAnimationFrame(loop);\n}\n\n// ===== Input =====\nfunction onKey(e) {\n  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ' || e.key === 'Spacebar') {\n    e.preventDefault();\n    // If a range slider has focus, Space would otherwise nudge it — blur first.\n    if (document.activeElement && document.activeElement.tagName === 'INPUT') {\n      document.activeElement.blur();\n    }\n    flap();\n  } else if (e.code === 'KeyR') {\n    if (state.mode === 'over' || state.mode === 'play' || state.mode === 'pause') {\n      startGame();\n    }\n  } else if (e.code === 'KeyP') {\n    togglePause();\n  } else if (e.code === 'KeyM') {\n    toggleMute();\n  }\n}\nwindow.addEventListener('keydown', onKey);\nstage.addEventListener('pointerdown', (e) => {\n  stage.focus();\n  flap();\n});\n\n// ===== Tweak bindings =====\nfunction bindTweaks() {\n  const g = document.getElementById('tw-gravity');\n  const gv = document.getElementById('tw-gravity-v');\n  const f = document.getElementById('tw-flap');\n  const fv = document.getElementById('tw-flap-v');\n  const s = document.getElementById('tw-speed');\n  const sv = document.getElementById('tw-speed-v');\n  const gp = document.getElementById('tw-gap');\n  const gpv = document.getElementById('tw-gap-v');\n  const tt = document.getElementById('tw-tier');\n  const ttv = document.getElementById('tw-tier-v');\n  g.value = tweaks.gravity; gv.textContent = tweaks.gravity;\n  f.value = tweaks.flap; fv.textContent = tweaks.flap;\n  s.value = tweaks.baseSpeed; sv.textContent = tweaks.baseSpeed;\n  gp.value = tweaks.gapSize; gpv.textContent = tweaks.gapSize;\n  tt.value = tweaks.startTier || 1; ttv.textContent = tt.value;\n  g.addEventListener('input', () => { const v = +g.value; gv.textContent = v; persistTweak('gravity', v); });\n  f.addEventListener('input', () => { const v = +f.value; fv.textContent = v; persistTweak('flap', v); });\n  s.addEventListener('input', () => { const v = +s.value; sv.textContent = v; persistTweak('baseSpeed', v); });\n  gp.addEventListener('input', () => { const v = +gp.value; gpv.textContent = v; persistTweak('gapSize', v); });\n  tt.addEventListener('input', () => { const v = +tt.value; ttv.textContent = v; persistTweak('startTier', v); });\n\n  // Hitbox debug overlay\n  const hb = document.getElementById('tw-hitbox');\n  const hbv = document.getElementById('tw-hitbox-v');\n  if (hb) {\n    hb.checked = !!tweaks.showHitboxes;\n    hbv.textContent = hb.checked ? 'on' : 'off';\n    hb.addEventListener('change', () => {\n      const v = hb.checked;\n      hbv.textContent = v ? 'on' : 'off';\n      persistTweak('showHitboxes', v);\n      const layer = document.getElementById('hitboxLayer');\n      if (layer) layer.setAttribute('opacity', v ? '1' : '0');\n    });\n    // Initial apply\n    const layer = document.getElementById('hitboxLayer');\n    if (layer) layer.setAttribute('opacity', tweaks.showHitboxes ? '1' : '0');\n  }\n\n  const pal = document.getElementById('tw-ball-pal');\n  Object.entries(BALL_PALETTES).forEach(([name, p]) => {\n    const sw = document.createElement('div');\n    sw.className = 'swatch' + (name === tweaks.ballPalette ? ' active' : '');\n    sw.style.background = p.mid;\n    sw.title = name;\n    sw.addEventListener('click', () => {\n      persistTweak('ballPalette', name);\n      applyBallPalette();\n      [...pal.children].forEach(c => c.classList.remove('active'));\n      sw.classList.add('active');\n    });\n    pal.appendChild(sw);\n  });\n}\n\n// ===== Sound Effects (Web Audio API) =====\nlet _audioCtx = null;\nlet _sfxMuted = false;\nfunction getAudioCtx() {\n  if (!_audioCtx) {\n    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n  }\n  if (_audioCtx.state === 'suspended') _audioCtx.resume();\n  return _audioCtx;\n}\nconst SFX = {\n  flap() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = 'sine';\n    osc.frequency.setValueAtTime(420, ctx.currentTime);\n    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.06);\n    gain.gain.setValueAtTime(0.18, ctx.currentTime);\n    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);\n    osc.connect(gain).connect(ctx.destination);\n    osc.start(ctx.currentTime);\n    osc.stop(ctx.currentTime + 0.1);\n  },\n  score() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = 'sine';\n    osc.frequency.setValueAtTime(880, ctx.currentTime);\n    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.06);\n    gain.gain.setValueAtTime(0.15, ctx.currentTime);\n    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);\n    osc.connect(gain).connect(ctx.destination);\n    osc.start(ctx.currentTime);\n    osc.stop(ctx.currentTime + 0.15);\n  },\n  gameOver() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    // Impact thud\n    const noise = ctx.createOscillator();\n    const ng = ctx.createGain();\n    noise.type = 'square';\n    noise.frequency.setValueAtTime(80, ctx.currentTime);\n    noise.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);\n    ng.gain.setValueAtTime(0.25, ctx.currentTime);\n    ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);\n    noise.connect(ng).connect(ctx.destination);\n    noise.start(ctx.currentTime);\n    noise.stop(ctx.currentTime + 0.3);\n    // Descending tone\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = 'sawtooth';\n    osc.frequency.setValueAtTime(440, ctx.currentTime + 0.05);\n    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);\n    gain.gain.setValueAtTime(0.12, ctx.currentTime + 0.05);\n    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);\n    osc.connect(gain).connect(ctx.destination);\n    osc.start(ctx.currentTime + 0.05);\n    osc.stop(ctx.currentTime + 0.5);\n  },\n  powerup() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    const notes = [523, 659, 784, 1047];\n    notes.forEach((freq, i) => {\n      const osc = ctx.createOscillator();\n      const gain = ctx.createGain();\n      osc.type = 'sine';\n      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.06);\n      gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.06);\n      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.12);\n      osc.connect(gain).connect(ctx.destination);\n      osc.start(ctx.currentTime + i * 0.06);\n      osc.stop(ctx.currentTime + i * 0.06 + 0.12);\n    });\n  },\n  milestone() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    const notes = [523, 659, 784, 1047, 1319];\n    notes.forEach((freq, i) => {\n      const osc = ctx.createOscillator();\n      const gain = ctx.createGain();\n      osc.type = 'triangle';\n      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.08);\n      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.08);\n      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.18);\n      osc.connect(gain).connect(ctx.destination);\n      osc.start(ctx.currentTime + i * 0.08);\n      osc.stop(ctx.currentTime + i * 0.08 + 0.18);\n    });\n  },\n  shieldHit() {\n    if (_sfxMuted) return;\n    const ctx = getAudioCtx();\n    const osc = ctx.createOscillator();\n    const gain = ctx.createGain();\n    osc.type = 'sine';\n    osc.frequency.setValueAtTime(2200, ctx.currentTime);\n    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);\n    gain.gain.setValueAtTime(0.18, ctx.currentTime);\n    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);\n    osc.connect(gain).connect(ctx.destination);\n    osc.start(ctx.currentTime);\n    osc.stop(ctx.currentTime + 0.2);\n    // Metallic overtone\n    const osc2 = ctx.createOscillator();\n    const gain2 = ctx.createGain();\n    osc2.type = 'square';\n    osc2.frequency.setValueAtTime(3400, ctx.currentTime);\n    osc2.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.12);\n    gain2.gain.setValueAtTime(0.06, ctx.currentTime);\n    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);\n    osc2.connect(gain2).connect(ctx.destination);\n    osc2.start(ctx.currentTime);\n    osc2.stop(ctx.currentTime + 0.15);\n  }\n};\nfunction toggleMute() {\n  _sfxMuted = !_sfxMuted;\n  const btn = document.getElementById('muteBtn');\n  if (btn) btn.textContent = _sfxMuted ? 'OFF' : 'SFX';\n  const rect = document.querySelector('#muteBtnG rect');\n  if (rect) rect.setAttribute('opacity', _sfxMuted ? '0.3' : '0.55');\n}\n\n// ===== Boot =====\nfunction boot() {\n  applyBallPalette();\n  initClouds();\n  initHills();\n  updateSky(0);\n  bindTweaks();\n  state.lastT = performance.now();\n  requestAnimationFrame(loop);\n  stage.focus();\n}\nboot();\n</script>\n\n\n</body></html>"
