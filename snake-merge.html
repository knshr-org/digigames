<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    color: #eee; user-select: none;
    touch-action: none;
  }
  #game-wrap {
    display: flex; flex-direction: column;
    align-items: center;
    width: 100%; max-width: 640px;
    flex: 1 1 auto;
    min-height: 0;
    padding: 8px;
    gap: 6px;
  }
  #hud { font-size: 0.85rem; color: #555; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #hud span { color: #fff; font-weight: bold; font-size: 1rem; }
  #mute-btn {
    background: none; border: 1px solid #333; color: #888;
    font-size: 1rem; cursor: pointer; padding: 2px 7px;
    border-radius: 3px; margin-left: 12px; line-height: 1;
    transition: border-color 0.2s, color 0.2s;
  }
  #mute-btn:hover { border-color: #fff; color: #fff; }
  #canvas-wrap {
    flex: 1 1 auto; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  canvas { border: 1px solid #1e1e1e; border-radius: 4px; display: block; max-width: 100%; max-height: 100%; object-fit: contain; }
  #msg { font-size: 0.72rem; color: #333; letter-spacing: 2px; flex-shrink: 0; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    z-index: 50;
  }
  #overlay h2 { font-size: 2rem; letter-spacing: 4px; }
  #overlay p  { color: #555; font-size: 0.82rem; }
  #overlay button {
    margin-top: 8px; padding: 10px 32px;
    background: none; border: 1px solid #333;
    color: #eee; font-size: 0.85rem; letter-spacing: 2px;
    cursor: pointer; border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
  }
  #overlay button:hover { border-color: #fff; color: #fff; }
  #dpad {
    display: none;
    flex-shrink: 0;
    width: 180px; height: 180px;
    position: relative;
    margin: 0 auto;
  }
  .dpad-btn {
    position: absolute; width: 60px; height: 60px;
    background: rgba(255,255,255,0.1); border: 1px solid #444;
    border-radius: 10px; color: #aaa; font-size: 1.6rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: rgba(255,255,255,0.25); border-color: #888; color: #fff; }
  #dpad-u { top: 0; left: 60px; }
  #dpad-d { bottom: 0; left: 60px; }
  #dpad-l { top: 60px; left: 0; }
  #dpad-r { top: 60px; right: 0; }
  @media (pointer: coarse) {
    #dpad { display: block; }
    #msg { display: none; }
  }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="hud">SCORE &nbsp;<span id="score">0</span> &nbsp;&nbsp; BEST &nbsp;<span id="best">0</span><button id="mute-btn" title="Toggle sound">&#x1F50A;</button></div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
  <div id="msg">ARROW KEYS or WASD</div>
  <div id="dpad">
    <div class="dpad-btn" id="dpad-u">&#9650;</div>
    <div class="dpad-btn" id="dpad-d">&#9660;</div>
    <div class="dpad-btn" id="dpad-l">&#9664;</div>
    <div class="dpad-btn" id="dpad-r">&#9654;</div>
  </div>
</div>
<div id="overlay">
  <h2 id="ol-title">SNAKE</h2>
  <p id="ol-sub">Eat the logos &middot; don't hit yourself</p>
  <button id="ol-btn">PLAY</button>
</div>

let snake, dir, nextDir, food, score, best=0, running=false, tickMs=150, timer;

/* ── Web Audio API Sound Effects ── */
var SFX = (function() {
  var actx = null;
  var muted = false;
  var muteBtn = document.getElementById('mute-btn');

  function ensureCtx() {
    if (!actx) {
      actx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }

  function osc(type, freq, startTime, endTime, gainVal, detune) {
    if (muted) return;
    var ctx = ensureCtx();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, startTime);
    if (detune) o.detune.setValueAtTime(detune, startTime);
    g.gain.setValueAtTime(gainVal || 0.18, startTime);
    g.gain.linearRampToValueAtTime(0, endTime);
    o.connect(g);
    g.connect(ctx.destination);
    o.start(startTime);
    o.stop(endTime + 0.01);
  }

  muteBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? '\u{1F507}' : '\u{1F50A}';
  });

  return {
    /* 1. Eat food – short satisfying blip */
    eat: function() {
      if (muted) return;
      var ctx = ensureCtx();
      var t = ctx.currentTime;
      osc('square', 520, t, t + 0.06, 0.13);
      osc('sine',   780, t + 0.03, t + 0.1, 0.1);
    },

    /* 2. Game over – low descending tone */
    gameOver: function() {
      if (muted) return;
      var ctx = ensureCtx();
      var t = ctx.currentTime;
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(340, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.7);
      g.gain.setValueAtTime(0.2, t);
      g.gain.linearRampToValueAtTime(0, t + 0.8);
      o.connect(g);
      g.connect(ctx.destination);
      o.start(t);
      o.stop(t + 0.85);
    },

    /* 3. Game start – short ascending chime */
    start: function() {
      if (muted) return;
      var ctx = ensureCtx();
      var t = ctx.currentTime;
      osc('sine', 440, t,        t + 0.1,  0.15);
      osc('sine', 554, t + 0.08, t + 0.18, 0.15);
      osc('sine', 660, t + 0.16, t + 0.3,  0.18);
    },

    /* 4. New high score – celebratory fanfare */
    highScore: function() {
      if (muted) return;
      var ctx = ensureCtx();
      var t = ctx.currentTime;
      osc('square', 523, t,        t + 0.12, 0.12);
      osc('square', 659, t + 0.1,  t + 0.22, 0.12);
      osc('square', 784, t + 0.2,  t + 0.32, 0.14);
      osc('sine',   1047,t + 0.3,  t + 0.55, 0.16);
      /* add a shimmery overtone */
      osc('triangle', 1568, t + 0.32, t + 0.6, 0.07);
    },

    /* 5. Speed up – quick ascending beep */
    speedUp: function() {
      if (muted) return;
      var ctx = ensureCtx();
      var t = ctx.currentTime;
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(900, t + 0.1);
      g.gain.setValueAtTime(0.12, t);
      g.gain.linearRampToValueAtTime(0, t + 0.13);
      o.connect(g);
      g.connect(ctx.destination);
      o.start(t);
      o.stop(t + 0.15);
    }
  };
})();

function initGame() {
  snake   = [{x:10,y:9},{x:9,y:9},{x:8,y:9}];
  dir     = {x:1, y:0};
  nextDir = {x:1, y:0};
  score   = 0;
  tickMs  = 150;
  spawnFood();
  scoreEl.textContent = 0;
}

function spawnFood() {
  const occ = new Set(snake.map(function(s){ return s.x+','+s.y; }));
  var p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (occ.has(p.x+','+p.y));
  food = {x:p.x, y:p.y, img: Math.random() < 0.5 ? 0 : 1};
}

function tick() {
  dir = nextDir;
  var head = snake[0];
  var nx = (head.x + dir.x + COLS) % COLS;
  var ny = (head.y + dir.y + ROWS) % ROWS;
  for (var i = 0; i < snake.length - 1; i++) {
    if (snake[i].x === nx && snake[i].y === ny) { SFX.gameOver(); endGame(); return; }
  }
  var ate = nx === food.x && ny === food.y;
  snake.unshift({x:nx, y:ny});
  if (ate) {
    score++;
    scoreEl.textContent = score;
    var wasNewBest = score > best;
    if (wasNewBest) { best = score; bestEl.textContent = best; }
    spawnFood();
    speedUp();
    if (wasNewBest && score > 1) { SFX.highScore(); } else { SFX.eat(); }
  } else {
    snake.pop();
  }
}

function speedUp() {
  var ms = Math.max(70, 150 - score * 4);
  if (ms !== tickMs) {
    tickMs = ms;
    clearInterval(timer);
    timer = setInterval(tick, tickMs);
    SFX.speedUp();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#181818';
  ctx.lineWidth = 0.5;
  for (var x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (var y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  var glowColors = ['#00aaff', '#ffaa00'];
  var pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
  ctx.shadowColor = glowColors[food.img];
  ctx.shadowBlur  = 10 + pulse * 14;
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(imgs[food.img], food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur  = 0;
  ctx.shadowColor = 'transparent';

  for (var i = 0; i < snake.length; i++) {
    var seg = snake[i];
    var a = Math.max(0.2, 1 - i * 0.05);
    ctx.fillStyle = i === 0 ? 'rgba(80,200,120,'+a+')' : 'rgba(50,160,90,'+a+')';
    roundRect(seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, 5);
    ctx.fill();
  }
  if (running) requestAnimationFrame(draw);
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function startGame() {
  overlay.style.display = 'none';
  initGame();
  running = true;
  timer = setInterval(tick, tickMs);
  requestAnimationFrame(draw);
  SFX.start();
}

function endGame() {
  running = false;
  clearInterval(timer);
  olTitle.textContent = 'GAME OVER';
  olSub.textContent   = 'Score: ' + score;
  olBtn.textContent   = 'RETRY';
  overlay.style.display = 'flex';
}

olBtn.addEventListener('click', startGame);

var DIRS = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}
};
document.addEventListener('keydown', function(e) {
  var key = e.key;
  var d = DIRS[key];
  if (!d) {
    if (key==='w'||key==='W') d={x:0,y:-1};
    else if (key==='s'||key==='S') d={x:0,y:1};
    else if (key==='a'||key==='A') d={x:-1,y:0};
    else if (key==='d'||key==='D') d={x:1,y:0};
  }
  if (!d) return;
  e.preventDefault();
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
});

/* ── Mobile D-pad ── */
function setDir(d) {
  if (!running) return;
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
}
document.getElementById('dpad-u').addEventListener('pointerdown', function(e) { e.preventDefault(); setDir({x:0,y:-1}); });
document.getElementById('dpad-d').addEventListener('pointerdown', function(e) { e.preventDefault(); setDir({x:0,y:1}); });
document.getElementById('dpad-l').addEventListener('pointerdown', function(e) { e.preventDefault(); setDir({x:-1,y:0}); });
document.getElementById('dpad-r').addEventListener('pointerdown', function(e) { e.preventDefault(); setDir({x:1,y:0}); });

/* ── Swipe support (full screen, triggers on move for responsiveness) ── */
var touchX = 0, touchY = 0, swiped = false;
document.addEventListener('touchstart', function(e) {
  if (e.target.closest('#dpad') || e.target.closest('#overlay') || e.target.closest('#mute-btn')) return;
  var t = e.touches[0];
  touchX = t.clientX; touchY = t.clientY;
  swiped = false;
}, {passive: true});
document.addEventListener('touchmove', function(e) {
  if (swiped) return;
  var t = e.touches[0];
  var dx = t.clientX - touchX, dy = t.clientY - touchY;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
  swiped = true;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? {x:1,y:0} : {x:-1,y:0});
  } else {
    setDir(dy > 0 ? {x:0,y:1} : {x:0,y:-1});
  }
}, {passive: true});
</script>
</body>
</html>
